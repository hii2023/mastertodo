<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>NOSH7 Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ============ DARK THEME (default) ============ */
:root{
  --bg:#060e1b; --s1:#0c1a2e; --s2:#112238; --s3:#172d48; --s4:#1e3557;
  --border:#1f3550; --border2:#2a4666;
  --text:#edf2fb; --sub:#8fafc8; --dim:#3d6080;
  --green:#00e676; --green-bg:rgba(0,230,118,.12);
  --amber:#ffb300; --red:#ff5252; --blue:#448aff;
  --shadow:rgba(0,0,0,.45);
  --card-shine:rgba(255,255,255,.018);
  --sheet-bg:#0c1a2e;
  --radius:12px; --radius-sm:8px;
}
/* ============ LIGHT THEME ============ */
body.light{
  --bg:#f0f4f8; --s1:#ffffff; --s2:#e8eef5; --s3:#dce4ef; --s4:#ccd7e6;
  --border:#c4d0df; --border2:#93acc3;
  --text:#0d1f2d; --sub:#3d5a73; --dim:#8aa0b5;
  --green:#00995a; --green-bg:rgba(0,153,90,.1);
  --amber:#b76e00; --red:#c62828; --blue:#1557b0;
  --shadow:rgba(0,0,0,.12);
  --card-shine:rgba(255,255,255,0);
  --sheet-bg:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}

body{
  background:var(--bg); color:var(--text);
  font-family:'Outfit',sans-serif; font-size:16px;
  min-height:100dvh; overflow-x:hidden;
  transition:background .25s, color .25s;
}

/* ========== TOPBAR ========== */
.topbar{
  position:sticky; top:0; z-index:200;
  background:rgba(6,14,27,.97);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:11px 14px 10px;
  transition:background .25s, border-color .25s;
}
body.light .topbar{ background:rgba(240,244,248,.97); }

.topbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.logo{
  font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600;
  color:var(--green); letter-spacing:2px;
  display:flex; align-items:center; gap:8px;
}
.logo-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--green); box-shadow:0 0 8px var(--green);
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.topbar-right{display:flex;align-items:center;gap:7px;}
.stats-pill{
  font-size:11px; color:var(--sub);
  font-family:'JetBrains Mono',monospace;
  background:var(--s2); border:1px solid var(--border);
  padding:4px 10px; border-radius:20px;
  transition:background .25s, border-color .25s;
}
.icon-btn{
  width:32px; height:32px; border-radius:var(--radius-sm);
  background:var(--s2); border:1px solid var(--border);
  color:var(--sub); cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.icon-btn:hover{border-color:var(--border2);color:var(--text);}

/* filter groups */
.filter-group{margin-bottom:8px;}
.filter-group:last-child{margin-bottom:0;}
.filter-label{
  font-size:9px; font-weight:700; color:var(--dim);
  letter-spacing:2px; text-transform:uppercase;
  font-family:'JetBrains Mono',monospace; margin-bottom:5px;
}
.chips-row{display:flex;flex-wrap:wrap;gap:5px;}
.chip{
  padding:5px 12px; border-radius:6px;
  font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid var(--border);
  background:var(--s1); color:var(--sub);
  transition:all .12s; user-select:none; white-space:nowrap;
}
.chip:hover{border-color:var(--border2);color:var(--text);}
.chip.ao{background:rgba(68,138,255,.14);border-color:rgba(68,138,255,.45);color:var(--blue);}
.chip.ad{background:rgba(255,179,0,.14);border-color:rgba(255,179,0,.45);color:var(--amber);}
.chip.ac{background:var(--green-bg);border-color:rgba(0,230,118,.4);color:var(--green);}
body.light .chip.ac{border-color:rgba(0,153,90,.4);}

/* ========== CONTAINER ========== */
.container{max-width:720px;margin:0 auto;padding:10px 12px 100px;}

/* ========== TASK CARD ========== */
.task-card{
  background:var(--s1); border:1px solid var(--border);
  border-left:4px solid var(--border);
  border-radius:var(--radius); margin-bottom:6px;
  cursor:grab; position:relative;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .2s ease;
  will-change:transform;
}
.task-card::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--card-shine) 0%,transparent 55%);
  pointer-events:none; border-radius:inherit;
}
.task-card:hover{
  border-color:var(--border2);
  box-shadow:0 4px 18px var(--shadow);
  transform:translateY(-1px);
}
.task-card.done{opacity:.32;}
.task-card.done:hover{transform:none;}
.task-card.dragging{opacity:.15;cursor:grabbing;transform:scale(.97);}

/* insertion line indicators */
.task-card.insert-above::before{
  content:'';position:absolute;
  top:-3px; left:6px; right:6px; height:3px;
  background:var(--green);
  box-shadow:0 0 12px rgba(0,230,118,.7);
  border-radius:2px; z-index:30;
  animation:lineSlide .12s ease;
}
.task-card.insert-below::after{
  content:'';position:absolute;
  bottom:-3px; left:6px; right:6px; height:3px;
  background:var(--green);
  box-shadow:0 0 12px rgba(0,230,118,.7);
  border-radius:2px; z-index:30;
  animation:lineSlide .12s ease;
}
@keyframes lineSlide{from{opacity:0;transform:scaleX(.5)}to{opacity:1;transform:scaleX(1)}}

body.light .task-card.insert-above::before,
body.light .task-card.insert-below::after{
  box-shadow:0 0 10px rgba(0,153,90,.5);
}

/* card grid: [rank 26px] [left 30px] [body 1fr] [meta auto] */
.card-grid{
  display:grid; grid-template-columns:26px 30px 1fr auto;
  gap:0 8px; padding:11px 12px 11px 8px; align-items:start;
}
.rank-num{
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:600; color:var(--dim);
  padding-top:4px; text-align:right; user-select:none;
}
.left-col{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:2px;}

.radio-btn{
  width:24px; height:24px; border-radius:50%;
  border:2.5px solid var(--border2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  background:none; flex-shrink:0;
}
.radio-btn:hover{border-color:var(--green);background:var(--green-bg);transform:scale(1.1);}
.radio-btn:active{transform:scale(.88);}
.radio-btn.done-r{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(0,230,118,.4);}
.radio-btn.done-r::after{
  content:''; width:8px; height:5px;
  border-left:2.5px solid var(--bg);
  border-bottom:2.5px solid var(--bg);
  transform:rotate(-45deg) translateY(-1px); display:block;
}
body.light .radio-btn.done-r{box-shadow:0 0 8px rgba(0,153,90,.35);}

.btn-log{
  width:24px; height:24px; background:none; border:none;
  color:var(--dim); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  border-radius:6px; transition:all .15s; position:relative; padding:0;
}
.btn-log:hover{color:var(--blue);background:rgba(68,138,255,.12);transform:scale(1.1);}
.log-badge{
  position:absolute; top:-5px; right:-5px;
  min-width:14px; height:14px; padding:0 2px;
  background:var(--blue); border-radius:7px;
  font-size:9px; color:#fff; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace;
}

.task-body{min-width:0;}
.task-name{
  font-size:15px; font-weight:700; color:var(--text);
  line-height:1.35; word-break:break-word; margin-bottom:2px;
}
.task-card.done .task-name{text-decoration:line-through;color:var(--sub);}
.task-desc{font-size:13px;color:var(--sub);line-height:1.4;font-style:italic;}
.task-desc:empty{display:none;}
.task-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{
  font-size:10px; font-weight:700; padding:2px 8px;
  border-radius:5px; white-space:nowrap; letter-spacing:.4px;
  font-family:'JetBrains Mono',monospace;
}
.dbl-hint{
  font-size:10px;color:var(--dim);font-style:italic;
  margin-top:5px;opacity:0;transition:opacity .2s;
}
.task-card:hover .dbl-hint{opacity:1;}

.task-meta{
  display:flex;flex-direction:column;
  align-items:flex-end;gap:5px;padding-top:2px;min-width:66px;
}
.owner-tag{
  font-size:10px; font-weight:700; padding:3px 8px;
  border-radius:5px; white-space:nowrap; letter-spacing:.4px;
  font-family:'JetBrains Mono',monospace;
}
.due-badge{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.due-badge.overdue{color:var(--red);}
.due-badge.soon{color:var(--amber);}
.due-badge.ok{color:var(--dim);}

/* done separator */
.done-sep{
  display:flex;align-items:center;gap:10px;
  margin:20px 0 8px;cursor:pointer;user-select:none;
}
.done-sep-line{flex:1;height:1px;background:var(--border);}
.done-sep-label{
  font-size:10px;font-weight:700;color:var(--dim);
  letter-spacing:2px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;white-space:nowrap;
}
.done-sep-toggle{font-size:10px;color:var(--dim);}

/* ========== FAB ========== */
.fab{
  position:fixed;bottom:24px;right:20px;
  width:56px;height:56px;background:var(--green);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:700;cursor:pointer;
  color:var(--bg);user-select:none;
  box-shadow:0 8px 28px rgba(0,230,118,.38);
  transition:transform .15s,box-shadow .15s;z-index:300;
}
.fab:hover{transform:scale(1.06);box-shadow:0 12px 36px rgba(0,230,118,.5);}
.fab:active{transform:scale(.92);}
body.light .fab{box-shadow:0 8px 28px rgba(0,153,90,.3);}

/* ========== MODALS ========== */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  z-index:500;display:none;align-items:flex-end;
  transition:background .2s;
}
.modal-ov.open{display:flex;background:rgba(0,0,0,.68);}

/* Mobile: bottom sheet */
.sheet{
  width:100%;background:var(--sheet-bg);
  border:1px solid var(--border2);border-bottom:none;
  border-radius:20px 20px 0 0;
  padding:0 0 env(safe-area-inset-bottom,20px);
  animation:sUp .24s cubic-bezier(.4,0,.2,1);
  max-height:92dvh;overflow-y:auto;overflow-x:hidden;
  transition:background .25s,border-color .25s;
}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Desktop: centered dialog */
@media(min-width:640px){
  .modal-ov{align-items:center;justify-content:center;padding:24px;}
  .sheet{
    border-radius:18px;border:1px solid var(--border2);
    width:100%;max-height:88vh;
    animation:fadeUp .2s cubic-bezier(.4,0,.2,1);
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(12px) scale(.98)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  .sheet-handle{display:none!important;}
  /* Edit modal: wider */
  #editModal .sheet{max-width:640px;}
  /* Other modals */
  #addModal .sheet,
  #logModal .sheet,
  #settingsModal .sheet{max-width:520px;}
  /* 2-column form layout for edit */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  .form-full{grid-column:1/-1;}
}
@media(max-width:639px){.form-row{display:contents;}}

.sheet-handle{
  width:38px;height:4px;border-radius:2px;
  background:var(--border2);margin:12px auto 0;
}
.sheet-inner{padding:18px 20px 24px;}

.sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.sheet-ttl{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.sheet-sub{font-size:12px;color:var(--sub);margin-top:3px;font-style:italic;}

.btn-del{
  background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);
  color:var(--red);padding:7px 13px;border-radius:7px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.btn-del:hover{background:rgba(255,82,82,.2);border-color:var(--red);}

/* fields */
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:10px;font-weight:700;
  color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:6px;font-family:'JetBrains Mono',monospace;
}
.field input,.field select,.field textarea{
  width:100%;background:var(--s3);
  border:1.5px solid var(--border);color:var(--text);
  padding:11px 14px;border-radius:var(--radius-sm);
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;
  outline:none;transition:border-color .15s,box-shadow .15s;
  appearance:none;-webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px var(--green-bg);
}
.field .inp-xl{font-size:17px;font-weight:700;padding:12px 14px;}
.field textarea{resize:none;min-height:72px;line-height:1.5;}
.field select option{background:var(--s2);}
.field input[type="date"]{color-scheme:dark;}
body.light .field input[type="date"]{color-scheme:light;}

/* cat chips */
.cat-grid{display:flex;flex-wrap:wrap;gap:7px;}
.cat-opt{
  padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;
  cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);
  transition:all .12s;user-select:none;font-family:'JetBrains Mono',monospace;
}
.cat-opt:hover{color:var(--text);border-color:var(--border2);}
.cat-opt.csel{font-weight:700;}

.sheet-btns{display:flex;gap:9px;margin-top:18px;}
.btn-p{
  flex:1;padding:13px;background:var(--green);border:none;
  border-radius:var(--radius-sm);color:var(--bg);
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .15s;letter-spacing:.3px;
}
.btn-p:hover{filter:brightness(1.08);box-shadow:0 4px 16px rgba(0,230,118,.3);}
.btn-p:active{transform:scale(.97);}
.btn-s{
  padding:13px 18px;background:var(--s2);
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  color:var(--sub);font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-s:hover{border-color:var(--border2);color:var(--text);}
.kbd-hint{font-size:10px;color:var(--dim);text-align:right;margin-top:10px;font-family:'JetBrains Mono',monospace;}

/* logs */
.log-entry{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--s2);}
.log-entry:last-child{border:none;}
.log-ts{color:var(--dim);flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;padding-top:2px;}
.log-txt{color:var(--text);font-size:14px;line-height:1.4;}
.log-empty{font-size:13px;color:var(--sub);padding:10px 0;font-style:italic;}

/* settings */
.set-section{margin-bottom:22px;}
.set-section-title{
  font-size:11px;font-weight:700;color:var(--sub);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
}
.item-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;min-height:30px;}
.item-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px 5px 12px;
  border:1px solid var(--border);border-radius:20px;
  font-size:13px;font-weight:500;color:var(--text);background:var(--s2);
}
.del-btn{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:14px;padding:0;display:flex;align-items:center;
  width:18px;height:18px;justify-content:center;border-radius:50%;transition:all .1s;
}
.del-btn:hover{color:var(--red);background:rgba(255,82,82,.12);}
.add-row{display:flex;gap:8px;}
.add-row input{
  flex:1;background:var(--s3);border:1.5px solid var(--border);color:var(--text);
  padding:9px 13px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;outline:none;
  transition:border-color .15s;
}
.add-row input:focus{border-color:var(--green);}
.add-row button{
  padding:9px 16px;background:var(--s3);border:1.5px solid var(--border);
  color:var(--sub);border-radius:8px;cursor:pointer;font-size:13px;
  font-weight:600;transition:all .15s;font-family:'Outfit',sans-serif;
}
.add-row button:hover{border-color:var(--green);color:var(--green);}

/* empty */
.empty{text-align:center;padding:70px 20px;color:var(--dim);font-size:14px;font-style:italic;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-head">
    <div class="logo"><div class="logo-dot"></div>N7 / BOARD</div>
    <div class="topbar-right">
      <div class="stats-pill" id="stats">-- tasks</div>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">&#9788;</button>
      <button class="icon-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
  </div>
  <div id="filtersWrap"></div>
</div>

<div class="container" id="list"></div>
<div class="fab" onclick="openAdd()" title="New task (N)">+</div>

<!-- ADD SHEET -->
<div class="modal-ov" id="addModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-hd">
        <div><div class="sheet-ttl">New Task</div><div class="sheet-sub">Press Enter to save</div></div>
      </div>
      <div class="field form-full">
        <label>Task Name</label>
        <input class="inp-xl" id="inp-name" placeholder="What needs to be done?" autocomplete="off"/>
      </div>
      <div class="field form-full">
        <label>Description</label>
        <textarea id="inp-desc" placeholder="Optional details..." rows="2"></textarea>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Owner</label>
          <select id="inp-owner"></select>
        </div>
        <div class="field">
          <label>Due Date</label>
          <input id="inp-due" type="date"/>
        </div>
      </div>
      <div class="field form-full" id="addCatWrap" style="display:none">
        <label>Category</label>
        <div class="cat-grid" id="addCatGrid"></div>
      </div>
      <div class="sheet-btns form-full">
        <button class="btn-s" onclick="closeAdd()">Cancel</button>
        <button class="btn-p" onclick="addTask()">Add Task</button>
      </div>
      <div class="kbd-hint">N to open &nbsp;|&nbsp; Enter to save &nbsp;|&nbsp; Esc to close</div>
    </div>
  </div>
</div>

<!-- EDIT SHEET -->
<div class="modal-ov" id="editModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-hd">
        <div>
          <div class="sheet-ttl">Edit Task</div>
          <div class="sheet-sub" id="edit-sub">double-click a card to edit</div>
        </div>
        <button class="btn-del" onclick="deleteTask()">Delete</button>
      </div>
      <div class="field form-full">
        <label>Task Name</label>
        <input class="inp-xl" id="edit-name" placeholder="Task name..." autocomplete="off"/>
      </div>
      <div class="field form-full">
        <label>Description</label>
        <textarea id="edit-desc" placeholder="Add a description..." rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Owner</label>
          <select id="edit-owner"></select>
        </div>
        <div class="field">
          <label>Due Date</label>
          <input id="edit-due" type="date"/>
        </div>
      </div>
      <div class="field form-full" id="editCatWrap" style="display:none">
        <label>Category</label>
        <div class="cat-grid" id="editCatGrid"></div>
      </div>
      <div class="sheet-btns form-full">
        <button class="btn-s" onclick="closeEdit()">Cancel</button>
        <button class="btn-p" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- LOG SHEET -->
<div class="modal-ov" id="logModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-hd">
        <div>
          <div class="sheet-ttl" id="log-ttl">Updates</div>
          <div class="sheet-sub" id="log-sub">0 updates</div>
        </div>
      </div>
      <div id="log-list" style="margin-bottom:16px;max-height:240px;overflow-y:auto;"></div>
      <div class="field">

const OWNER_PAL=[
  {bg:'rgba(68,138,255,.13)', c:'#82b1ff', cl:'#1557b0'},
  {bg:'rgba(255,82,130,.13)', c:'#ff80ab', cl:'#c2185b'},
  {bg:'rgba(255,179,0,.13)',  c:'#ffe082', cl:'#b76e00'},
  {bg:'rgba(0,230,118,.13)',  c:'#69f0ae', cl:'#00764a'},
  {bg:'rgba(213,0,249,.13)',  c:'#ea80fc', cl:'#7b1fa2'},
  {bg:'rgba(255,109,0,.13)',  c:'#ffab40', cl:'#e65100'},
];
const CAT_COLORS=['#00e676','#448aff','#d500f9','#ffb300','#ff5252','#ff6d00','#00b0ff','#69f0ae'];

function ownerStyle(name){
  const idx=[...( name||'')].reduce((s,c)=>s+c.charCodeAt(0),0)%OWNER_PAL.length;
  const p=OWNER_PAL[idx], light=!isDark;
  return{bg:p.bg, c:light?p.cl:p.c};
}
function catColor(name){
  const idx=[...(name||'')].reduce((s,c)=>s+c.charCodeAt(0),0)%CAT_COLORS.length;
  const base=CAT_COLORS[idx];
  if(!isDark){
    // darken for light bg: simple map
    const darks={'#00e676':'#007a3d','#448aff':'#1557b0','#d500f9':'#7b1fa2',
      '#ffb300':'#b76e00','#ff5252':'#c62828','#ff6d00':'#e65100','#00b0ff':'#0277bd','#69f0ae':'#00764a'};
    return darks[base]||base;
  }
  return base;
}

/* ===== DATE ===== */
function getRange(k){
  const now=new Date();
  const sod=d=>{const x=new Date(d);x.setHours(0,0,0,0);return x;};
  const eod=d=>{const x=new Date(d);x.setHours(23,59,59,999);return x;};
  if(k==='week'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return[sod(s),eod(e)];}
  if(k==='nextweek'){const s=new Date(now);s.setDate(now.getDate()-now.getDay()+7);const e=new Date(s);e.setDate(s.getDate()+6);return[sod(s),eod(e)];}
  if(k==='month') return[sod(new Date(now.getFullYear(),now.getMonth(),1)),eod(new Date(now.getFullYear(),now.getMonth()+1,0))];
  return null;
}
function fmtDue(str){
  if(!str) return null;
  const d=new Date(str+'T00:00:00');
  const now=new Date();now.setHours(0,0,0,0);
  const diff=Math.ceil((d-now)/86400000);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label=diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':`${d.getDate()} ${M[d.getMonth()]}`;
  return{label,cls:diff<0?'overdue':diff<=3?'soon':'ok'};
}

function getFiltered(){

  if(ownerF) r=r.filter(t=>t.owner===ownerF);

  if(dateF){const rng=getRange(dateF);if(rng) r=r.filter(t=>{if(!t.dueDate)return false;const d=new Date(t.dueDate+'T00:00:00');return d>=rng[0]&&d<=rng[1];});}
  return r.sort((a,b)=>(a.order||0)-(b.order||0));
}

/* ===== DRAG - INSERT MODE ===== */
let dragSrc=null, dragTgt=null, dragAbove=false;

async function insertAt(srcId,tgtId,above){
  if(!srcId||!tgtId||srcId===tgtId) return;
  const sorted=tasks.slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const src=sorted.find(x=>x.id===srcId);
  if(!src) return;
  const without=sorted.filter(t=>t.id!==srcId);
  const idx=without.findIndex(t=>t.id===tgtId);
  if(idx===-1) return;
  without.splice(above?idx:idx+1,0,src);
  const batch=db.batch();
  without.forEach((t,i)=>batch.update(db.collection('tasks').doc(t.id),{order:i*1000}));
  await batch.commit();
}

function clearDrag(){
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('dragging','insert-above','insert-below'));
  dragSrc=dragTgt=null;
}

/* ===== CREATE CARD ===== */
function createCard(t,rank){
  const card=document.createElement('div');
  card.className='task-card'+(t.done?' done':'');
  card.dataset.id=t.id;
  card.setAttribute('draggable','true');

  const due=fmtDue(t.dueDate);
  const os=ownerStyle(t.owner||'');
  const cc=t.category?catColor(t.category):null;
  const lc=(t.logs||[]).length;

  card.innerHTML=`
    <div class="card-grid">
      <div class="rank-num">#${rank}</div>
      <div class="left-col">
        <div class="radio-btn${t.done?' done-r':''}"></div>
        <button class="btn-log">&#9776;${lc?`<span class="log-badge">${lc>9?'9+':lc}</span>`:''}</button>
      </div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        ${t.desc?`<div class="task-desc">${t.desc}</div>`:''}
        ${cc?`<div class="task-tags"><span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}2a">${t.category}</span></div>`:''}
        <div class="dbl-hint">double-click to edit</div>
      </div>
      <div class="task-meta">
        <span class="owner-tag" style="background:${os.bg};color:${os.c}">${t.owner}</span>
        ${due?`<span class="due-badge ${due.cls}">${due.label}</span>`:''}
      </div>
    </div>`;

  /* radio */
  card.querySelector('.radio-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const rb=card.querySelector('.radio-btn');
    rb.style.transform='scale(.8)';
    setTimeout(()=>rb.style.transform='',200);
    toggleDone(t.id,t.done);
  });
  /* log */
  card.querySelector('.btn-log').addEventListener('click',e=>{e.stopPropagation();openLog(t.id);});

  /* double-click edit (desktop) */
  card.addEventListener('dblclick',e=>{
    if(e.target.closest('.radio-btn,.btn-log')) return;
    openEdit(t.id);
  });
  /* double-tap edit (mobile) */
  let lastTap=0, isTouchDrag=false;
  card.addEventListener('touchend',e=>{
    if(isTouchDrag) return;
    if(e.target.closest('.radio-btn,.btn-log')) return;
    const now=Date.now();
    if(now-lastTap<340){e.preventDefault();openEdit(t.id);}
    lastTap=now;
  });

  /* --- WEB DRAG --- */
  card.addEventListener('dragstart',e=>{
    if(e.target.closest('.radio-btn,.btn-log')){e.preventDefault();return;}
    dragSrc=t.id;e.dataTransfer.effectAllowed='move';
    setTimeout(()=>card.classList.add('dragging'),0);
  });
  card.addEventListener('dragend',()=>clearDrag());
  card.addEventListener('dragover',e=>{
    e.preventDefault();
    if(t.id===dragSrc) return;
    const rect=card.getBoundingClientRect();
    dragAbove=e.clientY<rect.top+rect.height/2;
    document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('insert-above','insert-below'));
    card.classList.add(dragAbove?'insert-above':'insert-below');
    dragTgt=t.id;
  });
  card.addEventListener('drop',e=>{
    e.preventDefault();insertAt(dragSrc,t.id,dragAbove);clearDrag();
  });

  /* --- MOBILE TOUCH DRAG (hold from anywhere) --- */
  let lpTimer=null,touchSX=0,touchSY=0,touchMoved=false,ghost=null;

  card.addEventListener('touchstart',e=>{
    if(e.target.closest('.radio-btn,.btn-log')) return;
    touchSX=e.touches[0].clientX;touchSY=e.touches[0].clientY;
    touchMoved=false;isTouchDrag=false;
    lpTimer=setTimeout(()=>{
      if(touchMoved) return;
      isTouchDrag=true;dragSrc=t.id;
      card.classList.add('dragging');
      if(navigator.vibrate) navigator.vibrate(40);
      ghost=card.cloneNode(true);
      Object.assign(ghost.style,{
        position:'fixed',width:card.offsetWidth+'px',opacity:'.82',
        pointerEvents:'none',zIndex:'9999',transition:'none',
        border:'2px solid var(--green)',borderRadius:'12px',
        background:'var(--s2)',boxShadow:'0 8px 32px rgba(0,230,118,.25)',
        left:(touchSX-20)+'px',top:(touchSY-70)+'px'
      });
      document.body.appendChild(ghost);
    },420);
  },{passive:true});

  card.addEventListener('touchmove',e=>{
    const dx=Math.abs(e.touches[0].clientX-touchSX);
    const dy=Math.abs(e.touches[0].clientY-touchSY);
    if(dx>7||dy>7){touchMoved=true;if(!isTouchDrag){clearTimeout(lpTimer);return;}}
    if(!isTouchDrag) return;
    e.preventDefault();
    const tc=e.touches[0];
    if(ghost){ghost.style.left=(tc.clientX-20)+'px';ghost.style.top=(tc.clientY-70)+'px';}
    ghost.style.display='none';
    const el2=document.elementFromPoint(tc.clientX,tc.clientY);
    ghost.style.display='';
    document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('insert-above','insert-below'));
    const tc2=el2&&el2.closest('.task-card');
    if(tc2&&tc2.dataset.id!==dragSrc){
      const rect=tc2.getBoundingClientRect();
      const above=tc.clientY<rect.top+rect.height/2;
      tc2.classList.add(above?'insert-above':'insert-below');
      dragTgt=tc2.dataset.id;dragAbove=above;
    } else dragTgt=null;
  },{passive:false});

  function endTouch(){
    clearTimeout(lpTimer);
    if(isTouchDrag){
      isTouchDrag=false;
      if(ghost){ghost.remove();ghost=null;}
      if(dragSrc&&dragTgt) insertAt(dragSrc,dragTgt,dragAbove);
      clearDrag();
    }
  }
  card.addEventListener('touchend',endTouch);
  card.addEventListener('touchcancel',endTouch);
  return card;
}

/* ===== RENDER ===== */
function render(){
  renderFilters();
  const f=getFiltered();
  const active=f.filter(t=>!t.done);
  const done=f.filter(t=>t.done);
  const list=document.getElementById('list');
  list.innerHTML='';
  document.getElementById('stats').textContent=
    active.length+' active'+(done.length?' / '+done.length+' done':'');

  if(!f.length){list.innerHTML='<div class="empty">No tasks here.<br>Press N or tap + to add one.</div>';return;}

  // active tasks - no header
  active.forEach((t,i)=>list.appendChild(createCard(t,i+1)));

  // done section with subtle separator
  if(done.length){
    const sep=document.createElement('div');sep.className='done-sep';
    sep.onclick=()=>{doneColl=!doneColl;render();};
    sep.innerHTML=`<div class="done-sep-line"></div>
      <div class="done-sep-label">Done ${done.length}</div>
      <div class="done-sep-toggle">${doneColl?'show':'hide'}</div>
      <div class="done-sep-line"></div>`;
    list.appendChild(sep);
    if(!doneColl) done.forEach((t,i)=>list.appendChild(createCard(t,active.length+i+1)));
  }
}

/* ===== REALTIME ===== */
db.collection('tasks').orderBy('order').onSnapshot(snap=>{
  tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

/* ===== INIT ===== */
initConfig();

/* ===== KEYBOARD ===== */
document.addEventListener('keydown',e=>{
  const a=document.activeElement;
  const typing=a.isContentEditable||['INPUT','SELECT','TEXTAREA'].includes(a.tagName);
  if(e.key==='Escape'){['addModal','editModal','logModal','settingsModal'].forEach(id=>document.getElementById(id).classList.remove('open'));}
  if(e.key==='n'&&!typing){e.preventDefault();openAdd();}
});
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addTask();}});
['addModal','editModal','logModal','settingsModal'].forEach(id=>
  document.getElementById(id).addEventListener('click',()=>document.getElementById(id).classList.remove('open'))
);
</script>
</body>
</html>
