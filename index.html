<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="N7"/>
<link rel="apple-touch-icon" id="a-icon" href=""/>
<link rel="manifest" id="app-manifest"/>
<meta name="theme-color" id="theme-meta" content="#00e676"/>
<title>N7 Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* === DARK (default) === */
:root {
  --bg:#060e1b; --s1:#0c1a2e; --s2:#112238; --s3:#172d48;
  --b1:#1f3550; --b2:#2a4666;
  --tx:#edf2fb; --sub:#8fafc8; --dim:#3d6080;
  --ac:#00e676; --acbg:rgba(0,230,118,.1); --acgl:rgba(0,230,118,.35);
  --am:#ffb300; --rd:#ff5252; --bl:#448aff;
  --sh:rgba(0,0,0,.5); --sh1:rgba(255,255,255,.018);
  --sheet:#0c1a2e; --r:10px; --rs:7px;
}
/* === LIGHT === */
body.light {
  --bg:#f0f4f8; --s1:#fff; --s2:#e8eef5; --s3:#dce4ef;
  --b1:#c4d0df; --b2:#93acc3;
  --tx:#0d1f2d; --sub:#3d5a73; --dim:#8aa0b5;
  --ac:#009e57; --acbg:rgba(0,158,87,.09); --acgl:rgba(0,158,87,.25);
  --am:#b76e00; --rd:#c62828; --bl:#1557b0;
  --sh:rgba(0,0,0,.12); --sh1:rgba(0,0,0,0);
  --sheet:#fff;
}


* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg); color:var(--tx);
  font-family:'Outfit',sans-serif; font-size:14px;
  min-height:100dvh; overflow-x:hidden;
  transition:background .2s, color .2s;
  text-transform:uppercase;
}

/* TOPBAR */
.topbar {
  position:sticky; top:0; z-index:200;
  background:rgba(6,14,27,.97);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  padding:8px 12px 7px;
  transition:background .2s, border-color .2s;
}
body.light .topbar { background:rgba(240,244,248,.97); }

.tb1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
.tbleft { display:flex; align-items:center; gap:7px; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--ac); box-shadow:0 0 7px var(--ac);
  animation:blink 2.5s ease-in-out infinite; flex-shrink:0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.stats {
  font-size:10px; color:var(--sub);
  font-family:'JetBrains Mono',monospace;
  background:var(--s2); border:1px solid var(--b1);
  padding:3px 8px; border-radius:20px;
}
.tbright { display:flex; align-items:center; gap:5px; }



.ibt {
  height:42px; padding:0 16px; border-radius:9px;
  background:var(--s2); border:1.5px solid var(--b1);
  color:var(--sub); cursor:pointer; font-size:14px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .15s; flex-shrink:0; font-family:'Outfit',sans-serif;
  white-space:nowrap; letter-spacing:.5px;
}
.ibt:hover { border-color:var(--b2); color:var(--tx); }
.ibt.on { border-color:var(--ac); color:var(--ac); background:var(--acbg); }
.ibt-sq { width:42px; padding:0; }

/* FILTER BAR */
.fb { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:2px 0; }
.sep { width:1px; height:22px; background:var(--b1); flex-shrink:0; margin:0 3px; }
.chip {
  padding:10px 18px; border-radius:8px;
  font-size:14px; font-weight:700;
  cursor:pointer; border:1.5px solid var(--b1);
  background:var(--s1); color:var(--sub);
  transition:all .12s; user-select:none; white-space:nowrap;
  line-height:1;
}
.chip:hover { border-color:var(--b2); color:var(--tx); }
.chip.ao { background:rgba(68,138,255,.13); border-color:rgba(68,138,255,.4); color:var(--bl); }
.chip.ad { background:rgba(255,179,0,.13);  border-color:rgba(255,179,0,.4);  color:var(--am); }
.chip.ar { background:rgba(255,179,0,.13); border-color:rgba(255,179,0,.4); color:var(--am); }
.chip.ac { background:var(--acbg); border-color:rgba(0,230,118,.35); color:var(--ac); }
body.light .chip.ac { border-color:rgba(0,158,87,.4); }
.chip.dash { border-style:dashed; }

/* Small chips for date, category, overdue */
.chip.sm {
  padding:4px 9px; border-radius:6px;
  font-size:11px;
}


/* CONTAINER */
.container { max-width:800px; margin:0 auto; padding:8px 10px 90px; }

/* TASK CARD */
.card {
  background:var(--s1);
  border:1px solid var(--b1); border-left:4px solid var(--b1);
  border-radius:var(--r); margin-bottom:7px;
  cursor:grab; position:relative;
  transition:box-shadow .15s, border-color .15s, opacity .15s;
  user-select:none;
}
.card::before {
  content:''; position:absolute; inset:0;
  border-radius:inherit; pointer-events:none;
  background:linear-gradient(135deg,var(--sh1) 0%,transparent 60%);
}
.card:hover { border-color:var(--b2); box-shadow:0 3px 14px var(--sh); }
.card.lifted { opacity:.08; cursor:grabbing; }

/* Card top row */
.crow {
  display:grid;
  grid-template-columns:36px 1fr auto;
  gap:0 10px;
  position:relative; z-index:1;
  padding:10px 12px 2px 10px;
  align-items:start;
}
.cradio {
  width:32px; height:32px; border-radius:50%;
  border:2.5px solid var(--b2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:2px;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  background:none;
}
.cradio:hover { border-color:var(--ac); background:var(--acbg); transform:scale(1.1); }
.cradio:active { transform:scale(.85); }
.cradio.done {
  background:var(--ac); border-color:var(--ac);
  box-shadow:0 0 10px var(--acgl);
}
.cradio.done::after {
  content:''; width:8px; height:5px;
  border-left:2.5px solid var(--bg); border-bottom:2.5px solid var(--bg);
  transform:rotate(-45deg) translateY(-1px); display:block;
}
.cbody { min-width:0; }
.cname {
  font-size:17px; font-weight:700; color:var(--tx);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.3; margin-bottom:0;
}
.card.done .cname {
  font-size:17px; font-weight:700; color:var(--tx);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.3; margin-bottom:0;
}
.cdue {
  font-size:10px; font-weight:600; margin-top:5px;
  font-family:'JetBrains Mono',monospace; display:none;
}
.cdue.overdue { color:var(--rd); }
.cdue.soon    { color:var(--am); }
.cdue.ok      { color:var(--dim); }
.ccat {
  display:none; margin-top:4px;
}
.ccatpill {
  display:inline-block; font-size:9px; font-weight:700; padding:1px 5px;
  border-radius:4px; font-family:'JetBrains Mono',monospace; letter-spacing:.3px;
}
.crank {
  display:block; font-size:10px; color:var(--dim);
  font-family:'JetBrains Mono',monospace; font-weight:600;
  margin-top:3px;
}
/* bottom padding row */
.cpad { height:6px; }

/* Rank watermark */
.cwm {
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;
  font-size:72px;
  font-weight:800;
  color:var(--tx);
  opacity:0.09;
  pointer-events:none;
  user-select:none;
  line-height:1;
  letter-spacing:-3px;
  z-index:0;
}
.clog {
  width:36px; height:36px; border-radius:6px;
  background:none; border:1px solid var(--b1);
  color:var(--dim); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s; position:relative; padding:0;
}
.clog:hover { color:var(--bl); border-color:rgba(68,138,255,.4); background:rgba(68,138,255,.1); }
.clog svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.lbadge {
  position:absolute; top:-5px; right:-5px;
  min-width:14px; height:14px; padding:0 3px;
  background:var(--bl); border-radius:7px;
  font-size:8px; color:#fff; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace;
}

/* Detailed rows */
.drow { padding:0 10px 8px 59px; display:flex; flex-direction:column; gap:4px; }
.ddesc {
  font-size:11px; color:var(--sub); line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden;
}
.dmeta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.duebadge { font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.duebadge.overdue { color:var(--rd); }
.duebadge.soon    { color:var(--am); }
.duebadge.ok      { color:var(--dim); }
.linkbtn {
  display:flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:4px;
  background:rgba(68,138,255,.1); border:1px solid rgba(68,138,255,.28);
  color:var(--bl); text-decoration:none; transition:all .15s;
}
.linkbtn:hover { background:rgba(68,138,255,.2); border-color:var(--bl); }
.linkbtn svg { width:10px; height:10px; stroke:currentColor; fill:none; stroke-width:2.5; stroke-linecap:round; }

/* Drag */
.spacer {
  border:2px dashed var(--ac); border-radius:var(--r);
  background:var(--acbg); margin-bottom:4px; position:relative;
}
.spacer::before {
  content:'Drop here'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; color:var(--ac);
  letter-spacing:2px; font-family:'JetBrains Mono',monospace; opacity:.5;
}
.ghost {
  position:fixed; z-index:9999; pointer-events:none;
  border:2px solid var(--ac) !important; border-radius:var(--r);
  box-shadow:0 12px 40px var(--acgl), 0 4px 12px var(--sh);
  transform:rotate(.5deg) scale(1.02); opacity:.9; cursor:grabbing;
}

/* Done section */
.donesep {
  display:flex; align-items:center; gap:8px;
  margin:16px 0 6px; cursor:pointer; user-select:none;
}
.dsline { flex:1; height:1px; background:var(--b1); }
.dslbl {
  font-size:9px; font-weight:700; color:var(--dim);
  letter-spacing:2px; font-family:'JetBrains Mono',monospace; white-space:nowrap;
}
.dscaret { font-size:9px; color:var(--dim); }
.donecard {
  display:flex; align-items:center; gap:8px;
  padding:6px 10px 6px 7px;
  background:var(--s1); border:1px solid var(--b1);
  border-radius:var(--r); margin-bottom:3px;
  opacity:.35; transition:opacity .15s;
}
.donecard:hover { opacity:.62; }
.doner {
  width:18px; height:18px; border-radius:50%;
  background:var(--ac); border:2px solid var(--ac);
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s;
}
.doner:hover { background:var(--acbg); border-color:var(--ac); transform:scale(1.1); }
.doner::after {
  content:''; width:6px; height:3.5px;
  border-left:2px solid var(--bg); border-bottom:2px solid var(--bg);
  transform:rotate(-45deg) translateY(-1px); display:block;
}
.doner:hover::after { border-color:var(--ac); }
.donename {
  flex:1; font-size:12px; font-weight:600; color:var(--sub);
  text-decoration:line-through; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap; min-width:0;
}
.doneow {
  font-size:9px; font-weight:700; padding:2px 6px;
  border-radius:4px; white-space:nowrap;
  font-family:'JetBrains Mono',monospace; flex-shrink:0;
}

/* FAB */
.fab {
  position:fixed; bottom:22px; right:16px;
  width:52px; height:52px; background:var(--ac);
  border-radius:15px; display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:700; cursor:pointer;
  color:var(--bg); user-select:none;
  box-shadow:0 8px 24px var(--acgl);
  transition:transform .15s, box-shadow .15s; z-index:300;
}
.fab:hover { transform:scale(1.07); }
.fab:active { transform:scale(.9); }

/* MODALS */
.mov {
  position:fixed; inset:0; background:rgba(0,0,0,0);
  z-index:500; display:none; align-items:flex-end;
  transition:background .2s;
}
.mov.open { display:flex; background:rgba(0,0,0,.7); }
.sheet {
  width:100%; background:var(--sheet);
  border:1px solid var(--b2); border-bottom:none;
  border-radius:18px 18px 0 0;
  padding:0 0 env(safe-area-inset-bottom,18px);
  animation:sup .22s cubic-bezier(.4,0,.2,1);
  max-height:92dvh; overflow-y:auto;
}
@keyframes sup { from{transform:translateY(100%)} to{transform:translateY(0)} }

@media(min-width:640px) {
  .mov { align-items:center; justify-content:center; padding:20px; }
  .sheet {
    border-radius:16px; border-bottom:1px solid var(--b2);
    max-height:88vh; animation:fup .2s ease;
  }
  @keyframes fup { from{opacity:0;transform:translateY(8px) scale(.98)} to{opacity:1;transform:none} }
  .handle { display:none !important; }
  #editM .sheet  { max-width:620px; }
  #addM .sheet, #logM .sheet, #setM .sheet, #instM .sheet { max-width:500px; }
  .frow { display:grid; grid-template-columns:1fr 1fr; gap:0 14px; }
  .ffull { grid-column:1/-1; }
}
@media(max-width:639px) { .frow { display:contents; } }

.handle { width:36px; height:4px; border-radius:2px; background:var(--b2); margin:10px auto 0; }
.si { padding:16px 18px 22px; }
.shd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:17px; }
.sttl { font-size:17px; font-weight:800; color:var(--tx); letter-spacing:.4px; }
.ssub { font-size:10px; color:var(--sub); margin-top:2px; letter-spacing:.5px; }
.bdel {
  background:rgba(255,82,82,.1); border:1px solid rgba(255,82,82,.3);
  color:var(--rd); padding:6px 12px; border-radius:var(--rs);
  font-family:'Outfit',sans-serif; font-size:11px; font-weight:700;
  cursor:pointer; transition:all .15s; white-space:nowrap; flex-shrink:0;
}
.bdel:hover { background:rgba(255,82,82,.2); border-color:var(--rd); }

.field { margin-bottom:12px; }
.field label {
  display:block; font-size:9px; font-weight:700; color:var(--sub);
  letter-spacing:1.5px; margin-bottom:5px;
  font-family:'JetBrains Mono',monospace;
}
.field input, .field select, .field textarea {
  width:100%; background:var(--s3);
  border:1.5px solid var(--b1); color:var(--tx);
  padding:10px 13px; border-radius:var(--rs);
  font-family:'Outfit',sans-serif; font-size:13px; font-weight:500;
  outline:none; transition:border-color .15s, box-shadow .15s;
  appearance:none; -webkit-appearance:none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:var(--ac); box-shadow:0 0 0 3px var(--acbg);
}
.field .xl { font-size:15px; font-weight:700; padding:11px 13px; }
.field textarea { resize:none; min-height:65px; line-height:1.5; }
.field select option { background:var(--s2); }
.field input[type="date"] { color-scheme:dark; }
body.light .field input[type="date"] { color-scheme:light; }
#inp-link, #edit-link { text-transform:none; }

.catgrid { display:flex; flex-wrap:wrap; gap:6px; }
.catopt {
  padding:6px 12px; border:1.5px solid var(--b1);
  border-radius:7px; cursor:pointer; font-size:10px; font-weight:700;
  color:var(--sub); transition:all .12s;
  user-select:none; font-family:'JetBrains Mono',monospace;
}
.catopt:hover { color:var(--tx); border-color:var(--b2); }
.catopt.sel { font-weight:800; }

.sbtns { display:flex; gap:8px; margin-top:16px; }
.bp {
  flex:1; padding:12px; background:var(--ac); border:none;
  border-radius:var(--rs); color:var(--bg);
  font-family:'Outfit',sans-serif; font-size:13px; font-weight:800;
  cursor:pointer; transition:all .15s; letter-spacing:.5px;
}
.bp:hover { filter:brightness(1.07); box-shadow:0 4px 14px var(--acgl); }
.bp:active { transform:scale(.97); }
.bs {
  padding:12px 16px; background:var(--s2);
  border:1.5px solid var(--b1); border-radius:var(--rs);
  color:var(--sub); font-family:'Outfit',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; transition:all .15s;
}
.bs:hover { border-color:var(--b2); color:var(--tx); }
.khint { font-size:9px; color:var(--dim); text-align:right; margin-top:8px; font-family:'JetBrains Mono',monospace; letter-spacing:1px; }

.logl { display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--s2); }
.logl:last-child { border:none; }
.logts { color:var(--dim); flex-shrink:0; font-family:'JetBrains Mono',monospace; font-size:10px; padding-top:2px; }
.logtx { color:var(--tx); font-size:12px; line-height:1.4; }
.logmt { font-size:11px; color:var(--sub); padding:8px 0; }

.setsec { margin-bottom:20px; }
.setttl {
  font-size:10px; font-weight:700; color:var(--sub); letter-spacing:2px;
  margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--b1);
  font-family:'JetBrains Mono',monospace;
}
.ilist { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; min-height:26px; }
.ipill {
  display:flex; align-items:center; gap:5px;
  padding:4px 7px 4px 11px; border:1px solid var(--b1);
  border-radius:18px; font-size:11px; font-weight:600;
  color:var(--tx); background:var(--s2);
}
.xb {
  background:none; border:none; color:var(--dim);
  cursor:pointer; font-size:13px; padding:0;
  display:flex; align-items:center;
  width:17px; height:17px; justify-content:center;
  border-radius:50%; transition:all .1s;
}
.xb:hover { color:var(--rd); background:rgba(255,82,82,.12); }
.addrow { display:flex; gap:7px; }
.addrow input {
  flex:1; background:var(--s3); border:1.5px solid var(--b1);
  color:var(--tx); padding:8px 11px; border-radius:var(--rs);
  font-family:'Outfit',sans-serif; font-size:12px; outline:none;
  transition:border-color .15s;
}
.addrow input:focus { border-color:var(--ac); }
.addrow button {
  padding:8px 13px; background:var(--s3); border:1.5px solid var(--b1);
  color:var(--sub); border-radius:var(--rs); cursor:pointer;
  font-size:11px; font-weight:700; transition:all .15s;
  font-family:'Outfit',sans-serif; white-space:nowrap;
}
.addrow button:hover { border-color:var(--ac); color:var(--ac); }

/* Install modal */
.iplat {
  font-size:12px; font-weight:800; color:var(--ac);
  letter-spacing:1.5px; margin-bottom:14px; padding-bottom:8px;
  border-bottom:1px solid var(--b1);
  font-family:'JetBrains Mono',monospace;
}
.istep { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; }
.istep:last-child { margin-bottom:0; }
.inum {
  width:22px; height:22px; border-radius:50%;
  background:var(--ac); color:var(--bg);
  font-size:11px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-family:'JetBrains Mono',monospace;
}
.itxt { font-size:13px; color:var(--tx); line-height:1.5; }
.itxt b { color:var(--ac); }

.empty { text-align:center; padding:60px 20px; color:var(--dim); font-size:12px; letter-spacing:1px; }

/* ============ DESKTOP LAYOUT (768px+) ============ */
@media(min-width:768px) {

  /* Hide topbar filter bar on desktop */
  .topbar .fb { display:none; }
  .topbar { padding:10px 20px 10px; }

  /* App shell: sidebar + main */
  .app-shell {
    display:flex;
    min-height:calc(100dvh - 56px);
  }

  /* LEFT SIDEBAR */
  .sidebar {
    width:220px;
    flex-shrink:0;
    position:sticky;
    top:56px;
    height:calc(100dvh - 56px);
    overflow-y:auto;
    border-right:1px solid var(--b1);
    padding:16px 14px 30px;
    background:var(--s1);
    display:flex;
    flex-direction:column;
    gap:0;
    scrollbar-width:none;
  }
  .sidebar::-webkit-scrollbar { display:none; }

  .sb-section { margin-bottom:20px; }
  .sb-label {
    font-size:9px; font-weight:700; color:var(--dim);
    letter-spacing:2px; font-family:'JetBrains Mono',monospace;
    margin-bottom:8px; display:block;
  }
  .sb-chips { display:flex; flex-direction:column; gap:4px; }
  .sb-chip {

/* ── PALETTES ── */
var OPALS = [
  {bg:'rgba(68,138,255,.13)',  c:'#82b1ff', cl:'#1557b0'},
  {bg:'rgba(255,82,130,.13)',  c:'#ff80ab', cl:'#c2185b'},
  {bg:'rgba(255,179,0,.13)',   c:'#ffe082', cl:'#b76e00'},
  {bg:'rgba(0,230,118,.13)',   c:'#69f0ae', cl:'#00764a'},
  {bg:'rgba(213,0,249,.13)',   c:'#ea80fc', cl:'#7b1fa2'},
  {bg:'rgba(255,109,0,.13)',   c:'#ffab40', cl:'#e65100'}
];
var CC = ['#00e676','#448aff','#d500f9','#ffb300','#ff5252','#ff6d00','#00b0ff','#69f0ae'];
var CCDARK = {'#00e676':'#007a3d','#448aff':'#1557b0','#d500f9':'#7b1fa2','#ffb300':'#b76e00','#ff5252':'#c62828','#ff6d00':'#e65100','#00b0ff':'#0277bd','#69f0ae':'#00764a'};

function ownerStyle(name) {
  if (!name) return OPALS[0];
  var idx = 0;
  for (var i = 0; i < name.length; i++) idx += name.charCodeAt(i);
  var p = OPALS[idx % OPALS.length];
  return { bg: p.bg, c: (currentTheme === 'light') ? p.cl : p.c };
}
function catColor(name) {
  if (!name) return '#69f0ae';
  var idx = 0;
  for (var i = 0; i < name.length; i++) idx += name.charCodeAt(i);
  var c = CC[idx % CC.length];
  return (currentTheme === 'light' && CCDARK[c]) ? CCDARK[c] : c;
}

var ICON_LOG  = '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
var ICON_LINK = '<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';

/* ── STATE ── */
var tasks      = [];
var users      = [];
var categories = [];
var ownerF = '', dateF = '', catF = '';
var addSelCat = '', editSelCat = '';
var logId = null, editId = null;

/* ── CONFIG ── */
async function initConfig() {
  var u = await db.collection('config').doc('users').get();
  if (!u.exists) await db.collection('config').doc('users').set({list:['Parking','Altaf','Sapna','Nope']});

db.collection('config').doc('users').onSnapshot(function(s) {

db.collection('config').doc('categories').onSnapshot(function(s) {

/* ── SETTINGS ── */
function openSet() { renderSettingsLists(); document.getElementById('setM').classList.add('open'); }

function renderSettingsLists() {

}

async function addUser() {

  await db.collection('config').doc('users').update({list: users.concat([n])});
  document.getElementById('inp-nu').value = '';

async function removeUser(n) {
  if (users.length <= 1) return;
  await db.collection('config').doc('users').update({list: users.filter(function(u){return u!==n;})});
  renderSettingsLists();
}
async function addCat() {
  var n = document.getElementById('inp-nc').value.trim();

/* ── CAT GRID ── */
function buildCatGrid(mode) {
  var gid = mode === 'add' ? 'addCG' : 'editCG';
  var sel = mode === 'add' ? addSelCat : editSelCat;
  var g = document.getElementById(gid);
  if (!g) return;
  g.innerHTML = categories.map(function(c) {
    var cc = catColor(c);
    var isSel = (sel === c);
    var style = isSel ? ('border-color:' + cc + ';color:' + cc + ';background:' + cc + '18') : '';
    return '<div class="catopt' + (isSel ? ' sel' : '') + '" onclick="pickCat(\'' + mode + '\',\'' + c + '\')" style="' + style + '">' + c + '</div>';
  }).join('');
}
function pickCat(mode, c) {
  if (mode === 'add') addSelCat = (addSelCat === c) ? '' : c;
  else                editSelCat = (editSelCat === c) ? '' : c;
  buildCatGrid(mode);
}

/* ── DATE HELPERS ── */
function getRange(k) {
  var now = new Date();
  function sod(d) { var x = new Date(d); x.setHours(0,0,0,0); return x; }
  function eod(d) { var x = new Date(d); x.setHours(23,59,59,999); return x; }
  if (k === 'week') {
    var s = new Date(now); s.setDate(now.getDate() - now.getDay());
    var e = new Date(s);   e.setDate(s.getDate() + 6);
    return [sod(s), eod(e)];
  }
  if (k === 'nextweek') {
    var s2 = new Date(now); s2.setDate(now.getDate() - now.getDay() + 7);
    var e2 = new Date(s2);  e2.setDate(s2.getDate() + 6);
    return [sod(s2), eod(e2)];
  }
  if (k === 'month') {
    return [sod(new Date(now.getFullYear(), now.getMonth(), 1)),
            eod(new Date(now.getFullYear(), now.getMonth() + 1, 0))];
  }
  return null;
}
function fmtDue(str) {
  if (!str) return null;
  var d = new Date(str + 'T00:00:00');
  var now = new Date(); now.setHours(0,0,0,0);
  var diff = Math.ceil((d - now) / 86400000);
  var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var label = diff===0 ? 'Today' : diff===1 ? 'Tomorrow' : diff===-1 ? 'Yesterday' : (d.getDate() + ' ' + M[d.getMonth()]);
  return { label:label, cls: diff<0 ? 'overdue' : diff<=3 ? 'soon' : 'ok' };
}

/* ── FILTER ── */
function getFiltered() {
  var r = tasks.slice();
  if (ownerF) r = r.filter(function(t){ return t.owner === ownerF; });
  if (dateF === 'overdue') {
    var now = new Date(); now.setHours(0,0,0,0);
    r = r.filter(function(t){ return t.dueDate && new Date(t.dueDate + 'T00:00:00') < now; });
  } else if (dateF === 'blank') {
    r = r.filter(function(t){ return !t.dueDate; });
  } else if (dateF) {
    var rng = getRange(dateF);
    if (rng) r = r.filter(function(t){
      if (!t.dueDate) return false;
      var d = new Date(t.dueDate + 'T00:00:00');
      return d >= rng[0] && d <= rng[1];
    });
  }
  if (catF === 'blank') r = r.filter(function(t){ return !t.category; });
  else if (catF)        r = r.filter(function(t){ return t.category === catF; });
  return r.sort(function(a,b){ return (a.order||0) - (b.order||0); });
}

function renderFilters() {
  var oc = {};
  tasks.forEach(function(t){ if (!t.done) oc[t.owner] = (oc[t.owner]||0) + 1; });
  var now2 = new Date(); now2.setHours(0,0,0,0);
  var hasOverdue = tasks.some(function(t){ return !t.done && t.dueDate && new Date(t.dueDate+'T00:00:00') < now2; });
  var usedCats = [];
  tasks.forEach(function(t){ if (t.category && !usedCats.includes(t.category)) usedCats.push(t.category); });

  var h = '';

  // ── ROW 1: Category ──
  if (categories.length || usedCats.length) {
    usedCats.forEach(function(c) {
      var cc = catColor(c);
      var style = (c !== catF) ? ('color:' + cc + '90') : '';
      h += '<span class="chip sm' + (c===catF ? ' ac' : '') + '" onclick="setCat(\'' + c + '\')" style="' + style + '">' + c + '</span>';
    });
    h += '<span class="chip sm dash' + (catF==='blank' ? ' ac' : '') + '" onclick="setCat(\'blank\')">No Cat</span>';
    h += '<div class="sep"></div>';
  }

  // ── ROW 2: Date ──
  if (hasOverdue) {
    h += '<span class="chip sm ar' + (dateF==='overdue' ? ' ad' : '') + '" onclick="setDate(\'overdue\')">Overdue</span>';
  }
  var dateOpts = [{k:'week',l:'This Wk',big:true},{k:'nextweek',l:'Nxt Wk'},{k:'month',l:'Month'},{k:'blank',l:'No Date',d:true}];
  dateOpts.forEach(function(opt) {
    var smClass = opt.big ? '' : ' sm';
    h += '<span class="chip' + smClass + (dateF===opt.k ? ' ad' : '') + (opt.d ? ' dash' : '') + '" onclick="setDate(\'' + opt.k + '\')">' + opt.l + '</span>';
  });
  h += '<div class="sep"></div>';

  // ── ROW 3: Owner ──
  h += '<span class="chip' + (!ownerF ? ' ao' : '') + '" onclick="setOwner(\'\')">All</span>';
  users.forEach(function(u) {
    var cnt = oc[u] || 0;
    h += '<span class="chip' + (u===ownerF ? ' ao' : '') + '" onclick="setOwner(\'' + u + '\')">' + u + (cnt ? ' '+cnt : '') + '</span>';
  });

  // ── CLEAR ALL (only if any filter active) ──
  if (ownerF || dateF || catF) {
    h += '<div class="sep"></div>';
    h += '<span class="chip sm" style="color:var(--rd);border-color:rgba(255,82,82,.3);background:rgba(255,82,82,.08)" onclick="clearAll()">&#10005; Clear</span>';
  }

  document.getElementById('fb').innerHTML = h;
}

function setDate(d)  { dateF = (dateF === d) ? '' : d; render(); }

/* ── FILTER-SAFE DRAG ──
   When dragging in a filtered view, visible tasks are reordered
   only within their original slots in the global order.
   Hidden tasks are never moved. */
var dragState = null;

async function commitOrder(newVisibleIds) {
  if (!newVisibleIds || !newVisibleIds.length) return;
  /* Sort all tasks by current order */
  var allSorted = tasks.slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });
  /* Build a set of visible IDs */
  var visSet = {};
  newVisibleIds.forEach(function(id){ visSet[id] = true; });
  /* Replace visible slots with the new order */
  var vi = 0;
  var finalIds = allSorted.map(function(t) {
    if (visSet[t.id]) return newVisibleIds[vi++];
    return t.id;
  });
  var batch = db.batch();
  finalIds.forEach(function(id, i) {
    batch.update(db.collection('tasks').doc(id), {order: i * 1000});
  });
  await batch.commit();
}

function flipAnimate(cards, beforeTops) {
  var afterTops = cards.map(function(c){ return c.getBoundingClientRect().top; });
  cards.forEach(function(c, i) {
    var dy = beforeTops[i] - afterTops[i];
    if (Math.abs(dy) < 1) return;
    c.style.transition = 'none';
    c.style.transform = 'translateY(' + dy + 'px)';
    c.getBoundingClientRect(); /* force reflow */
    c.style.transition = 'transform .18s cubic-bezier(.4,0,.2,1)';
    c.style.transform = '';
  });
}
function cleanTf() {
  document.querySelectorAll('.card').forEach(function(c){
    c.style.transform = ''; c.style.transition = '';
  });
}

function initDrag(card, t, cx, cy) {
  var rect = card.getBoundingClientRect();
  /* Ghost clone */
  var ghost = card.cloneNode(true);
  ghost.classList.add('ghost');
  ghost.style.cssText += ';position:fixed;left:' + rect.left + 'px;top:' + rect.top + 'px;width:' + rect.width + 'px;height:' + rect.height + 'px;margin:0;transition:none;z-index:9999;';
  document.body.appendChild(ghost);
  /* Spacer */
  var spacer = document.createElement('div');
  spacer.className = 'spacer';
  spacer.style.height = rect.height + 'px';
  card.classList.add('lifted');
  document.getElementById('list').insertBefore(spacer, card);
  card.style.display = 'none';
  dragState = {
    srcId:   t.id,
    srcCard: card,
    ghost:   ghost,
    spacer:  spacer,
    offX:    cx - rect.left,
    offY:    cy - rect.top,
    active:  true,
    lastKey: null
  };
  if (navigator.vibrate) navigator.vibrate(35);
}

function moveDrag(cx, cy) {
  if (!dragState || !dragState.active) return;
  var ghost  = dragState.ghost;
  var spacer = dragState.spacer;
  ghost.style.left = (cx - dragState.offX) + 'px';
  ghost.style.top  = (cy - dragState.offY) + 'px';
  /* Find card under cursor */
  ghost.style.visibility  = 'hidden';
  spacer.style.visibility = 'hidden';
  var el = document.elementFromPoint(cx, cy);
  ghost.style.visibility  = '';
  spacer.style.visibility = '';
  var tgt = el && el.closest('.card');
  if (!tgt || tgt === dragState.srcCard) return;
  var rect  = tgt.getBoundingClientRect();
  var above = cy < rect.top + rect.height / 2;
  var key   = tgt.dataset.id + (above ? 'A' : 'B');
  if (dragState.lastKey === key) return;
  dragState.lastKey = key;
  /* FLIP animate other cards */
  var moving = Array.from(document.querySelectorAll('.card')).filter(function(c){ return c !== dragState.srcCard; });
  var before = moving.map(function(c){ return c.getBoundingClientRect().top; });
  var list = document.getElementById('list');
  if (above) list.insertBefore(spacer, tgt);
  else       list.insertBefore(spacer, tgt.nextSibling);
  flipAnimate(moving, before);
}

async function endDrag() {
  if (!dragState || !dragState.active) return;
  var srcId   = dragState.srcId;
  var srcCard = dragState.srcCard;
  var ghost   = dragState.ghost;
  var spacer  = dragState.spacer;
  dragState.active = false;
  /* Animate ghost to spacer */
  var sr = spacer.getBoundingClientRect();
  ghost.style.transition = 'all .2s cubic-bezier(.4,0,.2,1)';
  ghost.style.left      = sr.left + 'px';
  ghost.style.top       = sr.top  + 'px';
  ghost.style.transform = 'rotate(0) scale(1)';
  ghost.style.opacity   = '0';
  /* Collect new visible order from DOM */
  var newVis = [];
  Array.from(document.getElementById('list').children).forEach(function(el) {
    if (el.classList.contains('spacer')) newVis.push(srcId);
    else if (el.classList.contains('card') && el.dataset.id !== srcId) newVis.push(el.dataset.id);
  });
  await new Promise(function(r){ setTimeout(r, 200); });
  ghost.remove();
  spacer.remove();
  srcCard.style.display = '';
  srcCard.classList.remove('lifted');
  cleanTf();
  dragState = null;
  await commitOrder(newVis);
}

/* ── CREATE CARD ── */
function createCard(t, rank) {
  var card = document.createElement('div');
  card.className = 'card' + (t.done ? ' done' : '');
  card.dataset.id = t.id;
  var due = fmtDue(t.dueDate);
  var os  = ownerStyle(t.owner || '');
  var cc  = t.category ? catColor(t.category) : null;
  var lc  = (t.logs || []).length;

  /* Compact row */
  var logBadgeHTML = lc ? '<span class="lbadge">' + (lc > 9 ? '9+' : lc) + '</span>' : '';

  var crow = document.createElement('div');
  crow.className = 'crow';
  var dueLineHTML = due ? '<div class="cdue ' + due.cls + '" style="margin-top:3px">&#128197; ' + due.label + '</div>' : '';
  var catLineHTML = cc ? '<div class="ccat"><span class="ccatpill" style="background:' + cc + '18;color:' + cc + ';border:1px solid ' + cc + '30">' + t.category + '</span></div>' : '';
  var ownerLineHTML = '<span class="ccatpill" style="background:' + os.bg + ';color:' + os.c + ';margin-left:' + (cc ? '6' : '0') + 'px">' + t.owner + '</span>';
  crow.innerHTML =
    '<div class="cradio' + (t.done ? ' done' : '') + '"></div>' +
    '<div class="cbody">' +
      '<div class="cname">' + t.name + '</div>' +
      dueLineHTML +
      (cc || true ? '<div class="ccat" style="display:flex;align-items:center;margin-top:3px">' + (cc ? '<span class="ccatpill" style="background:' + cc + '18;color:' + cc + ';border:1px solid ' + cc + '30">' + t.category + '</span>' : '') + ownerLineHTML + '</div>' : '') +
    '</div>' +
    '<button class="clog">' + ICON_LOG + logBadgeHTML + '</button>';
  card.appendChild(crow);
  var wmDiv = document.createElement('div');
  wmDiv.className = 'cwm';
  wmDiv.textContent = rank;
  card.appendChild(wmDiv);
  var padDiv = document.createElement('div');
  padDiv.className = 'cpad';
  card.appendChild(padDiv);

  /* Detailed rows (only in detailed mode) */
  if (!isCompact) {
    var hasDetail = t.desc || (due) || t.link;
    if (hasDetail) {
      var drow = document.createElement('div');
      drow.className = 'drow';
      var inner = '';
      if (t.desc) inner += '<div class="ddesc">' + t.desc + '</div>';
      var meta = '';
      if (due) meta += '<span class="duebadge ' + due.cls + '">' + due.label + '</span>';
      if (t.link) meta += '<a class="linkbtn" href="' + t.link + '" target="_blank" rel="noopener" title="' + t.link + '">' + ICON_LINK + '</a>';
      if (meta) inner += '<div class="dmeta">' + meta + '</div>';
      drow.innerHTML = inner;
      card.appendChild(drow);
      if (t.link) {
        var lb = drow.querySelector('.linkbtn');
        if (lb) lb.addEventListener('click', function(e){ e.stopPropagation(); });
      }
    }
  }

  /* Radio click */
  crow.querySelector('.cradio').addEventListener('click', function(e) {
    e.stopPropagation();
    var r = crow.querySelector('.cradio');
    r.style.transform = 'scale(.78)';
    setTimeout(function(){ r.style.transform = ''; }, 180);
    toggleDone(t.id, t.done);
  });

  /* Log click */
  crow.querySelector('.clog').addEventListener('click', function(e) {
    e.stopPropagation();
    openLog(t.id);
  });

  /* Double-click = open edit modal */
  card.addEventListener('dblclick', function(e) {
    if (!e.target.closest('.cradio, .clog, .linkbtn')) openEdit(t.id);
  });

  /* Mouse drag */
  card.addEventListener('mousedown', function(e) {
    if (e.button !== 0 || e.target.closest('.cradio, .clog, .linkbtn')) return;
    var sx = e.clientX, sy = e.clientY, moved = false;
    function onMove(ev) {
      if (!moved && (Math.abs(ev.clientX-sx) > 5 || Math.abs(ev.clientY-sy) > 5)) {
        moved = true;
        if (!dragState) initDrag(card, t, sx, sy);
      }
      if (moved && dragState) moveDrag(ev.clientX, ev.clientY);
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (moved && dragState) endDrag();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  /* Touch drag (long press) + double-tap */
  var lpt = null, tSX = 0, tSY = 0, tMv = false, tDr = false, lastTap = 0;
  card.addEventListener('touchstart', function(e) {
    if (e.target.closest('.cradio, .clog, .linkbtn')) return;
    tSX = e.touches[0].clientX;
    tSY = e.touches[0].clientY;
    tMv = false; tDr = false;
    lpt = setTimeout(function() {
      if (!tMv) { tDr = true; initDrag(card, t, tSX, tSY); }
    }, 420);
  }, {passive: true});

  card.addEventListener('touchmove', function(e) {
    var dx = Math.abs(e.touches[0].clientX - tSX);
    var dy = Math.abs(e.touches[0].clientY - tSY);
    if (dx > 7 || dy > 7) {
      tMv = true;
      if (!tDr) { clearTimeout(lpt); return; }
    }
    if (!tDr) return;
    e.preventDefault();
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: false});

  card.addEventListener('touchend', function(e) {
    clearTimeout(lpt);
    if (tDr) { tDr = false; endDrag(); return; }
    if (!e.target.closest('.cradio, .clog, .linkbtn')) {
      var now = Date.now();
      if (now - lastTap < 340) { e.preventDefault(); openEdit(t.id); }
      lastTap = now;
    }
  });
  card.addEventListener('touchcancel', function() {
    clearTimeout(lpt);
    if (tDr) { tDr = false; endDrag(); }
  });

  return card;
}

/* ── CREATE DONE CARD ── */
function createDoneCard(t) {
  var card = document.createElement('div');
  card.className = 'donecard';
  card.dataset.id = t.id;
  var os = ownerStyle(t.owner || '');
  card.innerHTML =
    '<div class="doner" title="Reopen task"></div>' +
    '<div class="donename">' + t.name + '</div>' +
    '<span class="doneow" style="background:' + os.bg + ';color:' + os.c + '">' + t.owner + '</span>';
  card.querySelector('.doner').addEventListener('click', function(e) {
    e.stopPropagation(); toggleDone(t.id, true);
  });
  card.addEventListener('dblclick', function(e) {
    if (!e.target.closest('.doner')) openEdit(t.id);
  });
  var lt = 0;
  card.addEventListener('touchend', function(e) {
    if (e.target.closest('.doner')) return;
    var now = Date.now();
    if (now - lt < 340) { e.preventDefault(); openEdit(t.id); }
    lt = now;
  });
  return card;
}

    html += '<div class="sb-chip' + (dateF===opt.k ? ' ad' : '') + '" onclick="setDate(\'' + opt.k + '\')">' + opt.l + '</div>';
  });
  html += '</div></div>';

  // ── CATEGORY (bottom) ──
  if (usedCats.length) {
    html += '<div class="sb-section"><span class="sb-label">Category</span><div class="sb-chips">';

      var cc = catColor(c);
      html += '<div class="sb-chip' + (c===catF ? ' ac' : '') + '" onclick="setCat(\'' + c + '\')" style="' + (c===catF ? '' : 'color:'+cc+'99') + '">' + c + '</div>';
    });

    html += '</div></div>';
  }
}

/* ── RENDER ── */
function render() {
  renderFilters();
  renderSidebar();
  var f      = getFiltered();
  var active = f.filter(function(t){ return !t.done; });
  var done   = f.filter(function(t){ return  t.done; });
  var list   = document.getElementById('list');
  list.innerHTML = '';

  document.getElementById('stats').textContent =
    active.length + ' active' + (done.length ? ' / ' + done.length + ' done' : '');

  if (!f.length) {
    list.innerHTML = '<div class="empty">No tasks. Press N or + to add one.</div>';
    return;
  }

  active.forEach(function(t, i) { list.appendChild(createCard(t, i + 1)); });

  if (done.length) {
    var sep = document.createElement('div');
    sep.className = 'donesep';
    sep.onclick = function() { doneColl = !doneColl; render(); };
    sep.innerHTML =
      '<div class="dsline"></div>' +
      '<div class="dslbl">Done - ' + done.length + '</div>' +
      '<div class="dscaret">' + (doneColl ? '&#9654;' : '&#9660;') + '</div>' +
      '<div class="dsline"></div>';
    list.appendChild(sep);
    if (!doneColl) {
      done.forEach(function(t) { list.appendChild(createDoneCard(t)); });
    }
  }
}

/* ── REALTIME LISTENER ── */
db.collection('tasks').onSnapshot(function(snap) {
  tasks = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
  render();
});

initConfig();

/* ── KEYBOARD ── */
document.addEventListener('keydown', function(e) {
  var a = document.activeElement;
  var typing = a.isContentEditable || ['INPUT','SELECT','TEXTAREA'].includes(a.tagName);
  if (e.key === 'Escape') {
    ['addM','editM','logM','setM','instM'].forEach(function(id) {
      document.getElementById(id).classList.remove('open');
    });
  }
  if (e.key === 'n' && !typing) { e.preventDefault(); openAdd(); }
});

document.getElementById('inp-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); addTask(); }
});

['addM','editM','logM','setM','instM'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function() {
    document.getElementById(id).classList.remove('open');
  });
});

/* ── INIT: called last so all vars are declared ── */
setTheme(currentTheme);

</script>
