<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NOSH7 Board</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:     #0d1520;
  --s1:     #121e2e;
  --s2:     #1c2c3f;
  --s3:     #233347;
  --border: #2a3d52;
  --text:   #e8eef5;
  --muted:  #7a8fa3;
  --dim:    #3d5268;
  --green:  #10b981;
  --amber:  #f59e0b;
  --red:    #f87171;
  --blue:   #60a5fa;
  --purple: #a78bfa;
  --pink:   #fb7185;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px; line-height:1.5;
  min-height:100dvh; overflow-x:hidden;
}

/* -------- TOPBAR -------- */
.topbar {
  position:sticky; top:0; z-index:200;
  background:rgba(13,21,32,0.97);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:10px 14px 9px;
}
.topbar-row {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:9px;
}
.logo {
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; font-weight:500;
  color:var(--green); letter-spacing:1.5px;
}
.stats {
  font-size:11px; color:var(--muted);
  font-family:'IBM Plex Mono',monospace;
}

/* Single scrollable filter bar */
.filter-bar {
  display:flex; gap:5px; align-items:center;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; padding-bottom:2px;
}
.filter-bar::-webkit-scrollbar { display:none; }

.chip {
  flex-shrink:0; padding:4px 11px; border-radius:6px;
  font-size:11px; font-weight:500; cursor:pointer;
  border:1px solid var(--border); background:var(--s1);
  color:var(--muted); transition:all 0.12s;
  user-select:none; white-space:nowrap;
  font-family:'IBM Plex Sans',sans-serif;
}
.chip:hover { border-color:var(--dim); color:var(--text); }
.chip.ao { background:rgba(96,165,250,0.12); border-color:rgba(96,165,250,0.4); color:var(--blue); }
.chip.ad { background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.4); color:var(--amber); }
.chip.ac { background:rgba(167,139,250,0.12); border-color:rgba(167,139,250,0.4); color:var(--purple); }
.fb-sep { flex-shrink:0; width:1px; height:16px; background:var(--border); margin:0 1px; }

/* -------- CONTAINER -------- */
.container {
  max-width:680px; margin:0 auto;
  padding:8px 12px 90px;
}

.section-head {
  display:flex; align-items:center; gap:8px;
  margin:16px 0 7px; cursor:pointer;
}
.section-label {
  font-size:10px; color:var(--muted);
  letter-spacing:2px; text-transform:uppercase;
  font-family:'IBM Plex Mono',monospace;
}
.collapse-toggle {
  font-size:10px; color:var(--dim);
  font-family:'IBM Plex Mono',monospace;
}

/* -------- TASK CARD -------- */
.task-card {
  background:var(--s1);
  border:1px solid var(--border);
  border-left:3px solid transparent;
  border-radius:9px; margin-bottom:5px;
  transition:border-color 0.15s, opacity 0.15s;
}
.task-card:hover { border-color:#354d65; }
.task-card[data-p="high"]   { border-left-color:var(--red); }
.task-card[data-p="medium"] { border-left-color:var(--amber); }
.task-card[data-p="low"]    { border-left-color:var(--green); }
.task-card.done { opacity:0.38; }
.task-card.dragging  { opacity:0.18; border-style:dashed; }
.task-card.drag-over { border-color:var(--green) !important; box-shadow:0 0 0 1px var(--green); }

/* Card grid: [left 30px] [body flex1] [meta auto] [drag 18px] */
.card-grid {
  display:grid;
  grid-template-columns:30px 1fr auto 20px;
  gap:0 8px;
  padding:9px 8px 9px 8px;
  align-items:start;
}

/* LEFT COL: radio + log btn */
.left-col {
  display:flex; flex-direction:column;
  align-items:center; gap:7px; padding-top:1px;
}

.radio-btn {
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--dim);
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.18s; background:none;
}
.radio-btn:hover { border-color:var(--green); background:rgba(16,185,129,0.08); }
.radio-btn.done-r {
  background:var(--green); border-color:var(--green);
}
.radio-btn.done-r::after {
  content:'';
  width:7px; height:4px;
  border-left:2px solid #0d1520;
  border-bottom:2px solid #0d1520;
  transform:rotate(-45deg) translateY(-1px);
  display:block;
}

.btn-log {
  width:22px; height:22px;
  background:none; border:none;
  color:var(--dim); cursor:pointer;
  font-size:14px;
  display:flex; align-items:center; justify-content:center;
  border-radius:5px; transition:all 0.12s;
  position:relative; padding:0; line-height:1;
}
.btn-log:hover { color:var(--blue); background:rgba(96,165,250,0.1); }
.log-badge {
  position:absolute; top:-4px; right:-4px;
  min-width:13px; height:13px; padding:0 2px;
  background:var(--blue); border-radius:7px;
  font-size:8px; color:#fff; font-weight:600;
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; line-height:1;
}

/* BODY: name + desc + tags */
.task-body { min-width:0; }

.task-name {
  font-size:13px; font-weight:500; color:var(--text);
  line-height:1.4; outline:none; border-radius:5px;
  padding:1px 4px; margin:-1px -4px;
  word-break:break-word; cursor:default;
  transition:background 0.12s;
}
.task-name[contenteditable="true"] {
  cursor:text; background:var(--s3);
  box-shadow:0 0 0 1.5px var(--green);
}
.task-card.done .task-name {
  text-decoration:line-through; color:var(--muted);
}

.task-desc {
  font-size:12px; color:var(--muted);
  margin-top:3px; outline:none; border-radius:5px;
  padding:1px 4px; margin-left:-4px;
  min-height:14px; line-height:1.4;
  cursor:default; transition:background 0.12s, color 0.12s;
  font-style:italic;
}
.task-desc[contenteditable="true"] {
  cursor:text; background:var(--s3);
  color:var(--text); font-style:normal;
  box-shadow:0 0 0 1.5px var(--border);
}
.task-desc:empty::before {
  content:attr(data-ph); color:var(--dim); font-style:italic;
}
.dblclick-hint {
  font-size:10px; color:var(--dim);
  font-style:italic; margin-top:2px; display:none;
}
.task-card:hover .dblclick-hint { display:block; }

.task-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.tag {
  font-size:10px; padding:2px 7px; border-radius:4px;
  font-weight:500; white-space:nowrap;
  font-family:'IBM Plex Mono',monospace; letter-spacing:0.3px;
}

/* META: owner + due */
.task-meta {
  display:flex; flex-direction:column;
  align-items:flex-end; gap:5px;
  padding-top:1px; min-width:68px;
}
.owner-tag {
  font-size:10px; font-weight:600;
  padding:2px 7px; border-radius:5px; white-space:nowrap;
  font-family:'IBM Plex Mono',monospace;
}
.due-badge {
  font-size:10px; font-family:'IBM Plex Mono',monospace;
  font-weight:500;
}
.due-badge.overdue { color:var(--red); }
.due-badge.soon    { color:var(--amber); }
.due-badge.ok      { color:var(--muted); }

/* DRAG HANDLE */
.drag-handle {
  color:var(--dim); cursor:grab;
  padding-top:2px; touch-action:none;
  user-select:none; text-align:center;
  font-size:15px; transition:color 0.1s;
}
.drag-handle:hover  { color:var(--muted); }
.drag-handle:active { cursor:grabbing; }

/* -------- FAB -------- */
.fab {
  position:fixed; bottom:22px; right:18px;
  width:52px; height:52px;
  background:var(--green); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:600; cursor:pointer;
  color:#0d1520; user-select:none;
  box-shadow:0 6px 24px rgba(16,185,129,0.35);
  transition:transform 0.12s; z-index:300;
}
.fab:active { transform:scale(0.91); }

/* -------- MODALS -------- */
.modal-ov {
  position:fixed; inset:0;
  background:rgba(0,0,0,0); z-index:500;
  display:none; align-items:flex-end;
  transition:background 0.2s;
}
.modal-ov.open { display:flex; background:rgba(0,0,0,0.65); }

.sheet {
  width:100%; background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px 18px 0 0;
  padding:20px 16px 30px;
  animation:sUp 0.22s cubic-bezier(.4,0,.2,1);
  max-height:88dvh; overflow-y:auto;
}
@keyframes sUp {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}

.sheet-title {
  font-family:'IBM Plex Mono',monospace;
  font-size:12px; font-weight:500;
  color:var(--green); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:18px;
}

.field { margin-bottom:13px; }
.field label {
  display:block; font-size:10px; color:var(--muted);
  letter-spacing:1.2px; text-transform:uppercase;
  margin-bottom:5px;
  font-family:'IBM Plex Mono',monospace;
}
.field input, .field select {
  width:100%; background:var(--s2);
  border:1px solid var(--border); color:var(--text);
  padding:9px 12px; border-radius:8px;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:13px; outline:none;
  transition:border-color 0.15s;
  appearance:none; -webkit-appearance:none;
}
.field input:focus, .field select:focus { border-color:var(--green); }
.field select option { background:var(--s2); color:var(--text); }
.field input[type="date"] { color-scheme:dark; }

/* Priority picker */
.pri-row { display:flex; gap:6px; }
.pri-opt {
  flex:1; padding:8px 4px; text-align:center;
  border:1px solid var(--border); border-radius:8px;
  cursor:pointer; font-size:12px; font-weight:500;
  color:var(--muted); transition:all 0.12s;
  user-select:none;
}
.pri-opt:hover { color:var(--text); border-color:var(--dim); }
.pri-opt.ph { border-color:var(--red);   color:var(--red);   background:rgba(248,113,113,0.1); }
.pri-opt.pm { border-color:var(--amber); color:var(--amber); background:rgba(245,158,11,0.1); }
.pri-opt.pl { border-color:var(--green); color:var(--green); background:rgba(16,185,129,0.1); }

/* Category picker */
.cat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.cat-opt {
  padding:7px 4px; text-align:center;
  border:1px solid var(--border); border-radius:7px;
  cursor:pointer; font-size:10px; font-weight:500;
  color:var(--muted); transition:all 0.12s;
  user-select:none;
  font-family:'IBM Plex Mono',monospace;
}
.cat-opt:hover { color:var(--text); border-color:var(--dim); }
.cat-opt.csel { font-weight:600; }

.sheet-btns { display:flex; gap:8px; margin-top:18px; }
.btn-p {
  flex:1; padding:11px;
  background:var(--green); border:none;
  border-radius:9px; color:#0d1520;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px; font-weight:600; cursor:pointer;
  transition:transform 0.1s;
}
.btn-p:active { transform:scale(0.97); }
.btn-s {
  padding:11px 18px; background:none;
  border:1px solid var(--border); border-radius:9px;
  color:var(--muted); font-family:'IBM Plex Sans',sans-serif;
  font-size:13px; cursor:pointer;
}
.kbd { font-size:10px; color:var(--dim); margin-top:10px; text-align:right; font-family:'IBM Plex Mono',monospace; }

/* Log sheet */
.log-entry {
  display:flex; gap:10px; padding:7px 0;
  border-bottom:1px solid var(--s2); font-size:12px;
}
.log-entry:last-child { border:none; }
.log-ts { color:var(--muted); flex-shrink:0; font-family:'IBM Plex Mono',monospace; font-size:11px; }
.log-txt { color:var(--text); }
.log-empty { font-size:12px; color:var(--muted); padding:8px 0; font-style:italic; }

/* Empty */
.empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:12px; font-style:italic; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="logo">N7 / BOARD</div>
    <div class="stats" id="stats">-- tasks</div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
</div>

<!-- TASK LIST -->
<div class="container" id="list"></div>

<!-- FAB -->
<div class="fab" onclick="openAdd()" title="New task  (N)">+</div>

<!-- ADD TASK SHEET -->
<div class="modal-ov" id="addModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">New Task</div>

    <div class="field">
      <label>Task Name</label>
      <input id="inp-name" placeholder="What needs to be done?" autocomplete="off" />
    </div>

    <div class="field">
      <label>Description</label>
      <input id="inp-desc" placeholder="Optional details..." autocomplete="off" />
    </div>

    <div class="field">
      <label>Owner</label>
      <select id="inp-owner">
        <option>Altaf</option>
        <option>Sapna</option>
        <option>Parking</option>
        <option>Nope</option>
      </select>
    </div>

    <div class="field">
      <label>Category</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <div class="field">
      <label>Priority</label>
      <div class="pri-row">
        <div class="pri-opt" data-p="high"   onclick="pickPri('high')">High</div>
        <div class="pri-opt pm" data-p="medium" onclick="pickPri('medium')">Medium</div>
        <div class="pri-opt" data-p="low"    onclick="pickPri('low')">Low</div>
      </div>
    </div>

    <div class="field">
      <label>Due Date</label>
      <input id="inp-due" type="date" />
    </div>

    <div class="sheet-btns">
      <button class="btn-s" onclick="closeAdd()">Cancel</button>
      <button class="btn-p" onclick="addTask()">Add Task</button>
    </div>
    <div class="kbd">Press N to open &nbsp;|&nbsp; Enter to save &nbsp;|&nbsp; Esc to cancel</div>
  </div>
</div>

<!-- LOG SHEET -->
<div class="modal-ov" id="logModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="log-title">Updates</div>
    <div id="log-list" style="margin-bottom:14px;max-height:240px;overflow-y:auto;"></div>
    <div class="field">
      <label>New Update</label>
      <input id="inp-log" placeholder="What happened?" autocomplete="off" />
    </div>
    <div class="sheet-btns">
      <button class="btn-s" onclick="closeLog()">Close</button>
      <button class="btn-p" onclick="submitLog()">Add Update</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey:      "AIzaSyBMG8nGe1Oa-_oycA5zgipy4oLMGpBq6WQ",
  authDomain:  "nosh7-2f0a3.firebaseapp.com",
  projectId:   "nosh7-2f0a3"
});
const db = firebase.firestore();

/* ===== CONSTANTS ===== */
const CATS = ['NOSH7','Automatric','Personal','Ops','Finance','Urgent','Admin','Other'];
const CAT_COLOR = {
  NOSH7:'#10b981', Automatric:'#60a5fa', Personal:'#a78bfa',
  Ops:'#f59e0b',   Finance:'#fb923c',    Urgent:'#f87171',
  Admin:'#94a3b8', Other:'#64748b'
};
const OWNER_STYLE = {
  Altaf:   { bg:'rgba(96,165,250,0.12)',   c:'#93c5fd' },
  Sapna:   { bg:'rgba(251,113,133,0.12)',  c:'#fda4af' },
  Parking: { bg:'rgba(251,191,36,0.12)',   c:'#fde68a' },
  Nope:    { bg:'rgba(148,163,184,0.12)',  c:'#cbd5e1' }
};
const PRI_COLOR = { high:'#f87171', medium:'#f59e0b', low:'#10b981' };

/* ===== STATE ===== */
let tasks         = [];
let ownerF = '', dateF = '', catF = '';
let selPri = 'medium', selCat = '';
let logId  = null;
let doneColl = false;

/* ===== CATEGORY GRID ===== */
function buildCatGrid() {
  document.getElementById('catGrid').innerHTML = CATS.map(c => {
    const cc = CAT_COLOR[c] || '#94a3b8';
    const isSel = selCat === c;
    return `<div class="cat-opt${isSel ? ' csel' : ''}"
                 onclick="pickCat('${c}')"
                 style="${isSel ? `border-color:${cc};color:${cc};background:${cc}18` : ''}">
              ${c}
            </div>`;
  }).join('');
}

function pickCat(c) { selCat = selCat === c ? '' : c; buildCatGrid(); }

function pickPri(p) {
  selPri = p;
  document.querySelectorAll('.pri-opt').forEach(el => {
    const ep = el.dataset.p;
    el.className = 'pri-opt' + (ep === p ? (ep === 'high' ? ' ph' : ep === 'medium' ? ' pm' : ' pl') : '');
  });
}

/* ===== DATE HELPERS ===== */
function getRange(k) {
  const now = new Date();
  const sod = d => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
  const eod = d => { const x = new Date(d); x.setHours(23,59,59,999); return x; };
  if (k === 'week') {
    const s = new Date(now); s.setDate(now.getDate() - now.getDay());
    const e = new Date(s);   e.setDate(s.getDate() + 6);
    return [sod(s), eod(e)];
  }
  if (k === 'nextweek') {
    const s = new Date(now); s.setDate(now.getDate() - now.getDay() + 7);
    const e = new Date(s);   e.setDate(s.getDate() + 6);
    return [sod(s), eod(e)];
  }
  if (k === 'month') {
    return [sod(new Date(now.getFullYear(), now.getMonth(), 1)),
            eod(new Date(now.getFullYear(), now.getMonth() + 1, 0))];
  }
  return null;
}

function fmtDue(str) {
  if (!str) return null;
  const d = new Date(str + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.ceil((d - now) / 86400000);
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label = diff === 0  ? 'Today'
              : diff === 1  ? 'Tomorrow'
              : diff === -1 ? 'Yesterday'
              : `${d.getDate()} ${M[d.getMonth()]}`;
  const cls = diff < 0 ? 'overdue' : diff <= 3 ? 'soon' : 'ok';
  return { label, cls };
}

/* ===== FILTER ===== */
function getFiltered() {
  let r = tasks.slice();
  if (ownerF) r = r.filter(t => t.owner === ownerF);
  if (catF)   r = r.filter(t => t.category === catF);
  if (dateF) {
    const rng = getRange(dateF);
    if (rng) r = r.filter(t => {
      if (!t.dueDate) return false;
      const d = new Date(t.dueDate + 'T00:00:00');
      return d >= rng[0] && d <= rng[1];
    });
  }
  return r.sort((a, b) => (a.order || 0) - (b.order || 0));
}

/* ===== ADD TASK ===== */
function openAdd() {
  selPri = 'medium'; selCat = '';
  buildCatGrid(); pickPri('medium');
  document.getElementById('inp-due').value = new Date().toISOString().slice(0, 10);
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 260);
}
function closeAdd() { document.getElementById('addModal').classList.remove('open'); }

async function addTask() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  await db.collection('tasks').add({
    name,
    desc:     document.getElementById('inp-desc').value.trim(),
    owner:    document.getElementById('inp-owner').value,
    category: selCat || '',
    priority: selPri || 'medium',
    dueDate:  document.getElementById('inp-due').value || '',
    done:     false,
    order:    Date.now(),
    logs:     []
  });
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-desc').value = '';
  closeAdd();
}

/* ===== INLINE EDIT (double-click only) ===== */
function enableEdit(el) {
  el.dataset.orig = el.innerText.trim();
  el.contentEditable = 'true';
  el.focus();
  const r = document.createRange();
  r.selectNodeContents(el); r.collapse(false);
  const s = window.getSelection();
  s.removeAllRanges(); s.addRange(r);
}

function disableEdit(el) {
  el.contentEditable = 'false';
  const val = el.innerText.trim();
  if (val !== el.dataset.orig) {
    db.collection('tasks').doc(el.dataset.id).update({ [el.dataset.f]: val });
  }
}

/* ===== TOGGLE DONE ===== */
function toggleDone(id, cur) {
  db.collection('tasks').doc(id).update({ done: !cur });
}

/* ===== LOGS ===== */
function openLog(id) {
  logId = id;
  const t = tasks.find(x => x.id === id);
  document.getElementById('log-title').textContent = t.name;
  renderLogs(t.logs || []);
  document.getElementById('logModal').classList.add('open');
  setTimeout(() => document.getElementById('inp-log').focus(), 260);
}
function closeLog() {
  document.getElementById('logModal').classList.remove('open');
  document.getElementById('inp-log').value = '';
  logId = null;
}
function renderLogs(logs) {
  const el = document.getElementById('log-list');
  el.innerHTML = logs.length
    ? logs.slice().reverse().map(l =>
        `<div class="log-entry">
           <span class="log-ts">${l.time}</span>
           <span class="log-txt">${l.text}</span>
         </div>`
      ).join('')
    : '<div class="log-empty">No updates yet.</div>';
}
async function submitLog() {
  const text = document.getElementById('inp-log').value.trim();
  if (!text || !logId) return;
  const t = tasks.find(x => x.id === logId);
  const logs = [...(t.logs || [])];
  const now = new Date();
  const ts = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.push({ text, time: ts });
  await db.collection('tasks').doc(logId).update({ logs });
  document.getElementById('inp-log').value = '';
  renderLogs(logs);
}

/* ===== DRAG ===== */
let dragSrc = null, dragTgt = null;

function swapOrder(a, b) {
  if (!a || !b || a === b) return;
  const ta = tasks.find(x => x.id === a), tb = tasks.find(x => x.id === b);
  if (!ta || !tb) return;
  const batch = db.batch();
  batch.update(db.collection('tasks').doc(a), { order: tb.order });
  batch.update(db.collection('tasks').doc(b), { order: ta.order });
  batch.commit();
}
function clearDrag() {
  document.querySelectorAll('.task-card').forEach(c =>
    c.classList.remove('dragging', 'drag-over')
  );
  dragSrc = dragTgt = null;
}

/* ===== CHIPS ===== */
function renderChips() {
  const owners   = [...new Set(tasks.map(t => t.owner).filter(Boolean))];
  const usedCats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
  const dateOpts = [
    { k:'week', l:'This Week' },
    { k:'nextweek', l:'Next Week' },
    { k:'month', l:'This Month' }
  ];

  let h = `<span class="chip${!ownerF ? ' ao' : ''}" onclick="setOwner('')">All</span>`;
  owners.forEach(o => {
    const cnt = tasks.filter(t => t.owner === o && !t.done).length;
    h += `<span class="chip${o === ownerF ? ' ao' : ''}" onclick="setOwner('${o}')">${o}${cnt ? ' ' + cnt : ''}</span>`;
  });

  h += '<div class="fb-sep"></div>';
  dateOpts.forEach(d =>
    h += `<span class="chip${d.k === dateF ? ' ad' : ''}" onclick="setDate('${d.k}')">${d.l}</span>`
  );

  if (usedCats.length) {
    h += '<div class="fb-sep"></div>';
    usedCats.forEach(c => {
      const cc = CAT_COLOR[c] || '#94a3b8';
      h += `<span class="chip${c === catF ? ' ac' : ''}"
                   onclick="setCat('${c}')"
                   style="${c === catF ? '' : `color:${cc}99`}">${c}</span>`;
    });
  }

  document.getElementById('filterBar').innerHTML = h;
}

function setOwner(o) { ownerF = o;              render(); }
function setDate(d)  { dateF  = dateF===d?'':d; render(); }
function setCat(c)   { catF   = catF===c?'':c;  render(); }

/* ===== CREATE CARD ===== */
function createCard(t, idx) {
  const card = document.createElement('div');
  card.className = 'task-card' + (t.done ? ' done' : '');
  card.dataset.id = t.id;
  card.dataset.p  = t.priority || 'medium';

  const due = fmtDue(t.dueDate);
  const os  = OWNER_STYLE[t.owner] || { bg:'rgba(148,163,184,0.1)', c:'#94a3b8' };
  const cc  = CAT_COLOR[t.category]  || '#64748b';
  const pc  = PRI_COLOR[t.priority]  || PRI_COLOR.medium;
  const lc  = (t.logs || []).length;

  card.innerHTML = `
    <div class="card-grid">

      <!-- LEFT: radio + log -->
      <div class="left-col">
        <div class="radio-btn${t.done ? ' done-r' : ''}"
             onclick="toggleDone('${t.id}',${t.done})"
             title="${t.done ? 'Reopen task' : 'Mark as done'}"></div>
        <button class="btn-log" onclick="openLog('${t.id}')" title="View / add updates">
          &#9776;
          ${lc ? `<span class="log-badge">${lc > 9 ? '9+' : lc}</span>` : ''}
        </button>
      </div>

      <!-- BODY: name + desc + tags -->
      <div class="task-body">
        <div class="task-name"
             contenteditable="false" spellcheck="false"
             data-id="${t.id}" data-f="name"
             ondblclick="enableEdit(this)">${t.name}</div>

        <div class="task-desc"
             contenteditable="false" spellcheck="false"
             data-id="${t.id}" data-f="desc"
             data-ph="double-click to add note..."
             ondblclick="enableEdit(this)">${t.desc || ''}</div>

        <div class="dblclick-hint">double-click to edit</div>

        ${t.category || t.priority ? `
        <div class="task-tags">
          ${t.category ? `<span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}30">${t.category}</span>` : ''}
          ${t.priority ? `<span class="tag" style="background:${pc}18;color:${pc};border:1px solid ${pc}30">${t.priority}</span>` : ''}
        </div>` : ''}
      </div>

      <!-- META: owner + due -->
      <div class="task-meta">
        <span class="owner-tag" style="background:${os.bg};color:${os.c}">${t.owner}</span>
        ${due ? `<span class="due-badge ${due.cls}">${due.label}</span>` : ''}
      </div>

      <!-- DRAG HANDLE -->
      <div class="drag-handle" title="Drag to reorder">&#8942;</div>

    </div>
  `;

  /* double-click edit */
  card.querySelectorAll('[contenteditable]').forEach(el => {
    el.addEventListener('blur',    () => disableEdit(el));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); el.blur(); }
      if (e.key === 'Escape') { el.innerText = el.dataset.orig || ''; el.blur(); }
      e.stopPropagation();
    });
    el.addEventListener('mousedown',  e => { if (el.contentEditable === 'true') e.stopPropagation(); });
    el.addEventListener('touchstart', e => { if (el.contentEditable === 'true') e.stopPropagation(); }, { passive:true });
  });

  /* web drag */
  const handle = card.querySelector('.drag-handle');
  handle.addEventListener('mousedown', () => card.setAttribute('draggable','true'));
  card.addEventListener('dragstart', e => {
    dragSrc = t.id; e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend',  () => { card.setAttribute('draggable','false'); clearDrag(); });
  card.addEventListener('dragover', e => {
    e.preventDefault();
    if (t.id === dragSrc) return;
    document.querySelectorAll('.task-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    card.classList.add('drag-over'); dragTgt = t.id;
  });
  card.addEventListener('drop', e => {
    e.preventDefault(); swapOrder(dragSrc, t.id);
    clearDrag(); card.setAttribute('draggable','false');
  });

  /* touch drag */
  let ghost = null, tActive = false;
  handle.addEventListener('touchstart', e => {
    tActive = true; dragSrc = t.id;
    card.classList.add('dragging');
    ghost = card.cloneNode(true);
    Object.assign(ghost.style, {
      position:'fixed', width:card.offsetWidth+'px', opacity:'0.85',
      pointerEvents:'none', zIndex:'9999', transition:'none',
      border:'1px solid var(--green)', borderRadius:'9px',
      background:'var(--s2)',
      left:(e.touches[0].clientX - 20)+'px',
      top: (e.touches[0].clientY - 20)+'px'
    });
    document.body.appendChild(ghost);
    e.preventDefault();
  }, { passive:false });

  handle.addEventListener('touchmove', e => {
    if (!tActive) return;
    const tc = e.touches[0];
    if (ghost) { ghost.style.left=(tc.clientX-20)+'px'; ghost.style.top=(tc.clientY-20)+'px'; }
    ghost.style.display = 'none';
    const el2 = document.elementFromPoint(tc.clientX, tc.clientY);
    ghost.style.display = '';
    document.querySelectorAll('.task-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    const tc2 = el2 && el2.closest('.task-card');
    if (tc2 && tc2.dataset.id !== dragSrc) { tc2.classList.add('drag-over'); dragTgt = tc2.dataset.id; }
    else dragTgt = null;
    e.preventDefault();
  }, { passive:false });

  handle.addEventListener('touchend', () => {
    if (!tActive) return; tActive = false;
    if (ghost) { ghost.remove(); ghost = null; }
    if (dragSrc && dragTgt) swapOrder(dragSrc, dragTgt);
    clearDrag();
  });

  return card;
}

/* ===== RENDER ===== */
function render() {
  renderChips();

  const f      = getFiltered();
  const active = f.filter(t => !t.done);
  const done   = f.filter(t => t.done);
  const list   = document.getElementById('list');
  list.innerHTML = '';

  document.getElementById('stats').textContent =
    active.length + ' active' + (done.length ? ' / ' + done.length + ' done' : '');

  if (!f.length) {
    list.innerHTML = '<div class="empty">No tasks here. Press N or + to add one.</div>';
    return;
  }

  if (active.length) {
    const sh = document.createElement('div'); sh.className = 'section-head';
    sh.innerHTML = `<div class="section-label">Active (${active.length})</div>`;
    list.appendChild(sh);
    active.forEach((t, i) => list.appendChild(createCard(t, i + 1)));
  }

  if (done.length) {
    const sh = document.createElement('div');
    sh.className = 'section-head';
    sh.onclick = () => { doneColl = !doneColl; render(); };
    sh.innerHTML = `<div class="section-label">Done (${done.length})</div>
                    <div class="collapse-toggle">${doneColl ? 'show' : 'hide'}</div>`;
    list.appendChild(sh);
    if (!doneColl) done.forEach((t, i) => list.appendChild(createCard(t, active.length + i + 1)));
  }
}

/* ===== REALTIME ===== */
db.collection('tasks').orderBy('order').onSnapshot(snap => {
  tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});

/* ===== KEYBOARD ===== */
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  const typing = active.isContentEditable || ['INPUT','SELECT','TEXTAREA'].includes(active.tagName);
  if (e.key === 'Escape') {
    document.getElementById('addModal').classList.remove('open');
    document.getElementById('logModal').classList.remove('open');
  }
  if (e.key === 'n' && !typing) { e.preventDefault(); openAdd(); }
});

document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.getElementById('inp-log').addEventListener('keydown',  e => { if (e.key === 'Enter') submitLog(); });
document.getElementById('addModal').addEventListener('click', closeAdd);
document.getElementById('logModal').addEventListener('click', closeLog);
</script>
</body>
