<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="N7"/>
<link rel="apple-touch-icon" id="a-icon" href=""/>
<link rel="manifest" id="app-manifest"/>
<meta name="theme-color" id="theme-meta" content="#00e676"/>
<title>N7 Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060e1b;--s1:#0c1a2e;--s2:#112238;--s3:#172d48;--border:#1f3550;--border2:#2a4666;--text:#edf2fb;--sub:#8fafc8;--dim:#3d6080;--acc:#00e676;--acc-bg:rgba(0,230,118,.1);--acc-glow:rgba(0,230,118,.35);--amber:#ffb300;--red:#ff5252;--blue:#448aff;--shadow:rgba(0,0,0,.5);--shine:rgba(255,255,255,.018);--sheet:#0c1a2e;--r:10px;--rsm:7px;}
body.light{--bg:#f0f4f8;--s1:#fff;--s2:#e8eef5;--s3:#dce4ef;--border:#c4d0df;--border2:#93acc3;--text:#0d1f2d;--sub:#3d5a73;--dim:#8aa0b5;--acc:#009e57;--acc-bg:rgba(0,158,87,.09);--acc-glow:rgba(0,158,87,.25);--amber:#b76e00;--red:#c62828;--blue:#1557b0;--shadow:rgba(0,0,0,.12);--shine:rgba(0,0,0,0);--sheet:#fff;}
body.pink{--bg:#100819;--s1:#1c0d2c;--s2:#26123e;--s3:#31184f;--border:#4e2272;--border2:#6e309e;--text:#fceeff;--sub:#c49de0;--dim:#7a4a9a;--acc:#e040fb;--acc-bg:rgba(224,64,251,.1);--acc-glow:rgba(224,64,251,.35);--amber:#ff80ab;--red:#ff5252;--blue:#d580ff;--shadow:rgba(0,0,0,.55);--shine:rgba(255,255,255,.02);--sheet:#1c0d2c;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;min-height:100dvh;overflow-x:hidden;transition:background .2s,color .2s;text-transform:uppercase;}
.topbar{position:sticky;top:0;z-index:200;background:rgba(6,14,27,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:8px 12px 7px;transition:background .2s,border-color .2s;}
body.light .topbar{background:rgba(240,244,248,.97);}
body.pink  .topbar{background:rgba(16,8,25,.97);}
.tb-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tb-left{display:flex;align-items:center;gap:7px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 7px var(--acc);animation:blink 2.5s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.stats{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace;background:var(--s2);border:1px solid var(--border);padding:3px 8px;border-radius:20px;}
.tb-right{display:flex;align-items:center;gap:5px;}
.theme-row{display:flex;align-items:center;gap:4px;}
.tdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.tdot:hover{transform:scale(1.2);}
.tdot.active{transform:scale(1.28);box-shadow:0 0 0 2px var(--acc);}
.tdot-dark{background:#0c1a2e;border-color:#2a4666;}
.tdot-light{background:#e8eef5;border-color:#93acc3;}
.tdot-pink{background:linear-gradient(135deg,#e040fb,#9c27b0);}
.ibt{width:30px;height:30px;border-radius:var(--rsm);background:var(--s2);border:1px solid var(--border);color:var(--sub);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.ibt:hover{border-color:var(--border2);color:var(--text);}
.ibt.av{border-color:var(--acc);color:var(--acc);background:var(--acc-bg);}
.filter-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.fb-sep{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 1px;}
.chip{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--s1);color:var(--sub);transition:all .12s;user-select:none;white-space:nowrap;}
.chip:hover{border-color:var(--border2);color:var(--text);}
.chip.co{background:rgba(68,138,255,.13);border-color:rgba(68,138,255,.4);color:var(--blue);}
.chip.cd{background:rgba(255,179,0,.13);border-color:rgba(255,179,0,.4);color:var(--amber);}
.chip.cr{background:rgba(255,82,82,.13);border-color:rgba(255,82,82,.4);color:var(--red);}
.chip.cc{background:var(--acc-bg);border-color:color-mix(in srgb,var(--acc) 40%,transparent);color:var(--acc);}
.chip.bd{border-style:dashed;}
.container{max-width:800px;margin:0 auto;padding:8px 10px 90px;}
.task-card{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--r);margin-bottom:4px;cursor:grab;position:relative;transition:box-shadow .15s,border-color .15s,opacity .15s;user-select:none;}
.task-card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(135deg,var(--shine) 0%,transparent 60%);}
.task-card:hover{border-color:var(--border2);box-shadow:0 3px 14px var(--shadow);}
.task-card.drag-lifted{opacity:.08;cursor:grabbing;}
.c-row{display:flex;align-items:center;gap:7px;padding:8px 10px 8px 7px;min-height:38px;}
.c-rank{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--dim);user-select:none;flex-shrink:0;width:22px;text-align:right;}
.c-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1);background:none;}
.c-radio:hover{border-color:var(--acc);background:var(--acc-bg);transform:scale(1.12);}
.c-radio:active{transform:scale(.85);}
.c-radio.done{background:var(--acc);border-color:var(--acc);box-shadow:0 0 8px var(--acc-glow);}
.c-radio.done::after{content:'';width:7px;height:4px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translateY(-1px);display:block;}
.c-name{flex:1;font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.task-card.done .c-name{text-decoration:line-through;color:var(--sub);}
.c-tags{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.c-pill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;}
.c-log{width:20px;height:20px;border-radius:5px;background:none;border:1px solid var(--border);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;position:relative;padding:0;}
.c-log:hover{color:var(--blue);border-color:rgba(68,138,255,.4);background:rgba(68,138,255,.1);}
.c-log svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.lbadge{position:absolute;top:-4px;right:-4px;min-width:12px;height:12px;padding:0 2px;background:var(--blue);border-radius:6px;font-size:8px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
.d-row{padding:0 10px 8px 59px;display:flex;flex-direction:column;gap:4px;}
.d-desc{font-size:11px;color:var(--sub);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.d-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.due{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.due.overdue{color:var(--red);}
.due.soon{color:var(--amber);}
.due.ok{color:var(--dim);}
.link-btn{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:rgba(68,138,255,.1);border:1px solid rgba(68,138,255,.28);color:var(--blue);text-decoration:none;transition:all .15s;}
.link-btn:hover{background:rgba(68,138,255,.2);border-color:var(--blue);}
.link-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
.drag-spacer{border:2px dashed var(--acc);border-radius:var(--r);background:var(--acc-bg);margin-bottom:4px;position:relative;}
.drag-spacer::before{content:'Drop here';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--acc);letter-spacing:2px;font-family:'JetBrains Mono',monospace;opacity:.5;}
.drag-ghost{position:fixed;z-index:9999;pointer-events:none;border:2px solid var(--acc)!important;border-radius:var(--r);box-shadow:0 12px 40px var(--acc-glow),0 4px 12px var(--shadow);transform:rotate(.5deg) scale(1.02);opacity:.9;cursor:grabbing;}
.done-sep{display:flex;align-items:center;gap:8px;margin:16px 0 6px;cursor:pointer;user-select:none;}
.done-sep-line{flex:1;height:1px;background:var(--border);}
.done-sep-lbl{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:2px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.done-sep-caret{font-size:9px;color:var(--dim);}
.done-card{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 7px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:3px;opacity:.35;transition:opacity .15s;}
.done-card:hover{opacity:.6;}
.done-r{width:18px;height:18px;border-radius:50%;background:var(--acc);border:2px solid var(--acc);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.done-r:hover{background:var(--acc-bg);border-color:var(--acc);transform:scale(1.1);}
.done-r::after{content:'';width:6px;height:3.5px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translateY(-1px);display:block;}
.done-r:hover::after{border-color:var(--acc);}
.done-name{flex:1;font-size:12px;font-weight:600;color:var(--sub);text-decoration:line-through;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.done-ow{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.fab{position:fixed;bottom:22px;right:16px;width:52px;height:52px;background:var(--acc);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;cursor:pointer;color:var(--bg);user-select:none;box-shadow:0 8px 24px var(--acc-glow);transition:transform .15s,box-shadow .15s;z-index:300;}
.fab:hover{transform:scale(1.07);}
.fab:active{transform:scale(.9);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:500;display:none;align-items:flex-end;transition:background .2s;}
.modal-ov.open{display:flex;background:rgba(0,0,0,.7);}
.sheet{width:100%;background:var(--sheet);border:1px solid var(--border2);border-bottom:none;border-radius:18px 18px 0 0;padding:0 0 env(safe-area-inset-bottom,18px);animation:sUp .22s cubic-bezier(.4,0,.2,1);max-height:92dvh;overflow-y:auto;}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:640px){
  .modal-ov{align-items:center;justify-content:center;padding:20px;}
  .sheet{border-radius:16px;border-bottom:1px solid var(--border2);max-height:88vh;animation:fUp .2s ease;}
  @keyframes fUp{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .sheet-handle{display:none!important;}
  #editModal .sheet{max-width:620px;}
  #addModal .sheet,#logModal .sheet,#settingsModal .sheet,#installModal .sheet{max-width:500px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
  .form-full{grid-column:1/-1;}
}
@media(max-width:639px){.form-row{display:contents;}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 0;}
.si{padding:16px 18px 22px;}
.shd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:17px;}
.sttl{font-size:17px;font-weight:800;color:var(--text);letter-spacing:.4px;}
.ssub{font-size:10px;color:var(--sub);margin-top:2px;letter-spacing:.5px;}
.bdel{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);color:var(--red);padding:6px 12px;border-radius:var(--rsm);font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.bdel:hover{background:rgba(255,82,82,.2);border-color:var(--red);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:9px;font-weight:700;color:var(--sub);letter-spacing:1.5px;margin-bottom:5px;font-family:'JetBrains Mono',monospace;}
.field input,.field select,.field textarea{width:100%;background:var(--s3);border:1.5px solid var(--border);color:var(--text);padding:10px 13px;border-radius:var(--rsm);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;appearance:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg);}
.field .xl{font-size:15px;font-weight:700;padding:11px 13px;}
.field textarea{resize:none;min-height:65px;line-height:1.5;}
.field select option{background:var(--s2);}
.field input[type="date"]{color-scheme:dark;}
body.light .field input[type="date"]{color-scheme:light;}
#inp-link,#edit-link{text-transform:none;}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;}
.cat-opt{padding:6px 12px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:10px;font-weight:700;color:var(--sub);transition:all .12px;user-select:none;font-family:'JetBrains Mono',monospace;}
.cat-opt:hover{color:var(--text);border-color:var(--border2);}
.cat-opt.csel{font-weight:800;}
.sbtns{display:flex;gap:8px;margin-top:16px;}
.bp{flex:1;padding:12px;background:var(--acc);border:none;border-radius:var(--rsm);color:var(--bg);font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.bp:hover{filter:brightness(1.07);box-shadow:0 4px 14px var(--acc-glow);}
.bp:active{transform:scale(.97);}
.bs{padding:12px 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--sub);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.bs:hover{border-color:var(--border2);color:var(--text);}
.log-entry{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--s2);}
.log-entry:last-child{border:none;}
.log-ts{color:var(--dim);flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;padding-top:2px;}
.log-txt{color:var(--text);font-size:12px;line-height:1.4;}
.log-mt{font-size:11px;color:var(--sub);padding:8px 0;}
.set-sec{margin-bottom:20px;}
.set-ttl{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:2px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;}
.item-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:26px;}
.item-pill{display:flex;align-items:center;gap:5px;padding:4px 7px 4px 11px;border:1px solid var(--border);border-radius:18px;font-size:11px;font-weight:600;color:var(--text);background:var(--s2);}
.xbtn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:0;display:flex;align-items:center;width:17px;height:17px;justify-content:center;border-radius:50%;transition:all .1s;}
.xbtn:hover{color:var(--red);background:rgba(255,82,82,.12);}
.add-row{display:flex;gap:7px;}
.add-row input{flex:1;background:var(--s3);border:1.5px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--rsm);font-family:'Outfit',sans-serif;font-size:12px;outline:none;transition:border-color .15s;}
.add-row input:focus{border-color:var(--acc);}
.add-row button{padding:8px 13px;background:var(--s3);border:1.5px solid var(--border);color:var(--sub);border-radius:var(--rsm);cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;font-family:'Outfit',sans-serif;white-space:nowrap;}
.add-row button:hover{border-color:var(--acc);color:var(--acc);}
.install-plat{font-size:12px;font-weight:800;color:var(--acc);letter-spacing:1.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;}
.istep{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.istep:last-child{margin-bottom:0;}
.inum{width:22px;height:22px;border-radius:50%;background:var(--acc);color:var(--bg);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.itxt{font-size:13px;color:var(--text);line-height:1.5;}
.itxt strong{color:var(--acc);}
.empty{text-align:center;padding:60px 20px;color:var(--dim);font-size:12px;letter-spacing:1px;}
.kbd-hint{font-size:9px;color:var(--dim);text-align:right;margin-top:8px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-row1">
    <div class="tb-left"><div class="dot"></div><div class="stats" id="stats">-- tasks</div></div>
    <div class="tb-right">
      <div class="theme-row">
        <div class="tdot tdot-dark active" id="td-dark" onclick="setTheme('dark')" title="Dark"></div>
        <div class="tdot tdot-light" id="td-light" onclick="setTheme('light')" title="Light"></div>
        <div class="tdot tdot-pink" id="td-pink" onclick="setTheme('pink')" title="Pink"></div>
      </div>
      <button class="ibt av" id="viewBtn" onclick="toggleView()" title="Compact view">&#8803;</button>
      <button class="ibt" onclick="openInstall()" title="Install app">&#8659;</button>
      <button class="ibt" onclick="openSettings()">&#9881;</button>
    </div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
</div>
<div class="container" id="list"></div>
<div class="fab" onclick="openAdd()">+</div>

<!-- ADD -->
<div class="modal-ov" id="addModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="si">
      <div class="shd"><div><div class="sttl">New Task</div><div class="ssub">Enter to save</div></div></div>
      <div class="field form-full"><label>Task Name</label><input class="xl" id="inp-name" placeholder="What needs to be done?" autocomplete="off"/></div>
      <div class="field form-full"><label>Description</label><textarea id="inp-desc" placeholder="Optional details..." rows="2"></textarea></div>
      <div class="form-row">
        <div class="field"><label>Owner</label><select id="inp-owner"></select></div>
        <div class="field"><label>Due Date</label><input id="inp-due" type="date"/></div>
      </div>
      <div class="field form-full"><label>Link (optional)</label><input id="inp-link" type="url" placeholder="https://..." autocomplete="off"/></div>
      <div class="field form-full" id="addCatWrap" style="display:none"><label>Category</label><div class="cat-grid" id="addCatGrid"></div></div>
      <div class="sbtns form-full"><button class="bs" onclick="closeAdd()">Cancel</button><button class="bp" onclick="addTask()">Add Task</button></div>
      <div class="kbd-hint">N to open &nbsp;|&nbsp; Enter to save &nbsp;|&nbsp; Esc to close</div>
    </div>
  </div>
</div>

<!-- EDIT -->
<div class="modal-ov" id="editModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="si">
      <div class="shd"><div><div class="sttl">Edit Task</div><div class="ssub" id="edit-sub">--</div></div><button class="bdel" onclick="deleteTask()">Delete</button></div>
      <div class="field form-full"><label>Task Name</label><input class="xl" id="edit-name" autocomplete="off"/></div>
      <div class="field form-full"><label>Description</label><textarea id="edit-desc" rows="3"></textarea></div>
      <div class="form-row">
        <div class="field"><label>Owner</label><select id="edit-owner"></select></div>
        <div class="field"><label>Due Date</label><input id="edit-due" type="date"/></div>
      </div>
      <div class="field form-full"><label>Link (optional)</label><input id="edit-link" type="url" placeholder="https://..." autocomplete="off"/></div>
      <div class="field form-full" id="editCatWrap" style="display:none"><label>Category</label><div class="cat-grid" id="editCatGrid"></div></div>
      <div class="sbtns form-full"><button class="bs" onclick="closeEdit()">Cancel</button><button class="bp" onclick="saveEdit()">Save Changes</button></div>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="modal-ov" id="logModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="si">

  const due=fmtDue(t.dueDate);const os=ownerStyle(t.owner||'');const cc=t.category?catColor(t.category):null;const lc=(t.logs||[]).length;
  const cr=document.createElement('div');cr.className='c-row';
  cr.innerHTML=`<div class="c-rank">#${rank}</div><div class="c-radio${t.done?' done':''}"></div><div class="c-name">${t.name}</div><div class="c-tags"><span class="c-pill" style="background:${os.bg};color:${os.c}">${t.owner}</span>${cc?`<span class="c-pill" style="background:${cc}18;color:${cc};border:1px solid ${cc}28">${t.category}</span>`:''}${isCompact&&due?`<span class="c-pill due ${due.cls}" style="padding:0 3px;background:none">${due.label}</span>`:''}</div><button class="c-log" title="Updates">${ILOG}${lc?`<span class="lbadge">${lc>9?'9+':lc}</span>`:''}</button>`;
  card.appendChild(cr);
  if(!isCompact&&(t.desc||due||t.link)){const dr=document.createElement('div');dr.className='d-row';let inner='';if(t.desc)inner+=`<div class="d-desc">${t.desc}</div>`;let meta='';if(due)meta+=`<span class="due ${due.cls}">${due.label}</span>`;if(t.link)meta+=`<a class="link-btn" href="${t.link}" target="_blank" rel="noopener" title="${t.link}">${ILINK}</a>`;if(meta)inner+=`<div class="d-meta">${meta}</div>`;dr.innerHTML=inner;card.appendChild(dr);if(t.link){const lb=dr.querySelector('.link-btn');if(lb)lb.addEventListener('click',e=>e.stopPropagation());}}
  cr.querySelector('.c-radio').addEventListener('click',e=>{e.stopPropagation();const r=cr.querySelector('.c-radio');r.style.transform='scale(.75)';setTimeout(()=>r.style.transform='',180);toggleDone(t.id,false);});
  cr.querySelector('.c-log').addEventListener('click',e=>{e.stopPropagation();openLog(t.id);});
  card.addEventListener('dblclick',e=>{if(!e.target.closest('.c-radio,.c-log,.link-btn'))openEdit(t.id);});
  card.addEventListener('mousedown',e=>{if(e.button!==0||e.target.closest('.c-radio,.c-log,.link-btn'))return;const sx=e.clientX,sy=e.clientY;let mv=false;const onM=ev=>{if(!mv&&(Math.abs(ev.clientX-sx)>5||Math.abs(ev.clientY-sy)>5)){mv=true;if(!dragState)initDrag(card,t,sx,sy);}if(mv&&dragState)moveDrag(ev.clientX,ev.clientY);};const onU=()=>{document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);if(mv&&dragState)endDrag();};document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);});
  let lpt=null,tSX=0,tSY=0,tMv=false,tDr=false,lastTap=0;
  card.addEventListener('touchstart',e=>{if(e.target.closest('.c-radio,.c-log,.link-btn'))return;tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;tMv=false;tDr=false;lpt=setTimeout(()=>{if(!tMv){tDr=true;initDrag(card,t,tSX,tSY);}},420);},{passive:true});
  card.addEventListener('touchmove',e=>{const dx=Math.abs(e.touches[0].clientX-tSX),dy=Math.abs(e.touches[0].clientY-tSY);if(dx>7||dy>7){tMv=true;if(!tDr){clearTimeout(lpt);return;}}if(!tDr)return;e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  const onTE=e=>{clearTimeout(lpt);if(tDr){tDr=false;endDrag();return;}if(!e.target.closest('.c-radio,.c-log,.link-btn')){const now=Date.now();if(now-lastTap<340){e.preventDefault();openEdit(t.id);}lastTap=now;}};
  card.addEventListener('touchend',onTE);card.addEventListener('touchcancel',()=>{clearTimeout(lpt);if(tDr){tDr=false;endDrag();}});
  return card;
}
function createDoneCard(t){const card=document.createElement('div');card.className='done-card';card.dataset.id=t.id;const os=ownerStyle(t.owner||'');card.innerHTML=`<div class="done-r" title="Reopen"></div><div class="done-name">${t.name}</div><span class="done-ow" style="background:${os.bg};color:${os.c}">${t.owner}</span>`;card.querySelector('.done-r').addEventListener('click',e=>{e.stopPropagation();toggleDone(t.id,true);});card.addEventListener('dblclick',e=>{if(!e.target.closest('.done-r'))openEdit(t.id);});let lt=0;card.addEventListener('touchend',e=>{if(e.target.closest('.done-r'))return;const now=Date.now();if(now-lt<340){e.preventDefault();openEdit(t.id);}lt=now;});return card;}
function render(){renderFilters();const f=getFiltered();const active=f.filter(t=>!t.done);const done=f.filter(t=>t.done);const list=document.getElementById('list');list.innerHTML='';document.getElementById('stats').textContent=active.length+' active'+(done.length?' / '+done.length+' done':'');if(!f.length){list.innerHTML='<div class="empty">No tasks. Press N or + to add one.</div>';return;}active.forEach((t,i)=>list.appendChild(createCard(t,i+1)));if(done.length){const sep=document.createElement('div');sep.className='done-sep';sep.onclick=()=>{doneColl=!doneColl;render();};sep.innerHTML=`<div class="done-sep-line"></div><div class="done-sep-lbl">Done - ${done.length}</div><div class="done-sep-caret">${doneColl?'&#9654;':'&#9660;'}</div><div class="done-sep-line"></div>`;list.appendChild(sep);if(!doneColl)done.forEach(t=>list.appendChild(createDoneCard(t)));}}
db.collection('tasks').orderBy('order').onSnapshot(snap=>{tasks=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
initConfig();
document.addEventListener('keydown',e=>{const a=document.activeElement,typing=a.isContentEditable||['INPUT','SELECT','TEXTAREA'].includes(a.tagName);if(e.key==='Escape'){['addModal','editModal','logModal','settingsModal','installModal'].forEach(id=>document.getElementById(id).classList.remove('open'));}if(e.key==='n'&&!typing){e.preventDefault();openAdd();}});
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addTask();}});
['addModal','editModal','logModal','settingsModal','installModal'].forEach(id=>document.getElementById(id).addEventListener('click',()=>document.getElementById(id).classList.remove('open')));
</script>
</body>
