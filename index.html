<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOSH7 Action Board (v5 Mobile Optimized)</title>

<style>
body { margin:0; font-family: system-ui; background:#f6f7fb; }
.topbar { display:flex; gap:8px; padding:10px; background:#0f172a; color:#fff; flex-wrap:wrap; }
.chip { padding:6px 10px; background:#1e293b; border-radius:20px; cursor:pointer; }
.chip.active { background:#22c55e; color:#000; }
.container { padding:10px; }
.task { background:#fff; padding:12px; margin-bottom:10px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
.task.done { opacity:0.5; }
.header { display:flex; justify-content:space-between; align-items:center; }
.logs { font-size:12px; margin-top:5px; }
.desc { font-size:13px; color:#555; }
.priority { font-weight:bold; color:#22c55e; }
.fab { position:fixed; bottom:20px; right:20px; background:#22c55e; color:#000; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 4px 10px rgba(0,0,0,0.2); cursor:pointer; }
.modal { position:fixed; bottom:0; left:0; right:0; background:#fff; padding:15px; border-radius:20px 20px 0 0; display:none; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ddd; }
button { padding:10px; border:none; border-radius:8px; background:#22c55e; }
</style>
</head>
<body>

<div class="topbar">
<div id="ownerChips"></div>
<div id="categoryChips"></div>
<div>
<span class="chip" onclick="setTimeFilter('week')">Week</span>
<span class="chip" onclick="setTimeFilter('month')">Month</span>
<span class="chip" onclick="setTimeFilter('')">All</span>
</div>
</div>

<div class="container" id="list"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
<input id="name" placeholder="Task name" />
<select id="owner">
<option>Altaf</option><option>Sapna</option><option>Parking</option><option>Nope</option>
</select>
<input id="category" placeholder="Category" />
<input id="deadline" type="date" />
<button onclick="addTask()">Add Task</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBMG8nGe1Oa-_oycA5zgipy4oLMGpBq6WQ",
  authDomain: "nosh7-2f0a3.firebaseapp.com",
  projectId: "nosh7-2f0a3",
  storageBucket: "nosh7-2f0a3.firebasestorage.app",
  messagingSenderId: "726990430722",
  appId: "1:726990430722:web:874f212689909eec36bd1b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let tasks=[];
let ownerFilter='',categoryFilter='',timeFilter='';

function openModal(){ document.getElementById('modal').style.display='block'; }

function addTask(){
  const name=document.getElementById('name').value;
  if(!name) return;

  db.collection("tasks").add({
    name,
    owner:document.getElementById('owner').value,
    category:document.getElementById('category').value,
    deadline:document.getElementById('deadline').value,
    done:false,
    order:Date.now(),
    logs:[]
  });

  document.getElementById('modal').style.display='none';
}

function toggleDone(id,val){
  db.collection("tasks").doc(id).update({done:!val});
}

function reorder(index,dir){
  const newIndex=index+dir;
  if(newIndex<0||newIndex>=tasks.length) return;

  const t1=tasks[index];
  const t2=tasks[newIndex];

  const temp=t1.order;
  t1.order=t2.order;
  t2.order=temp;

  db.collection("tasks").doc(t1.id).update({order:t1.order});
  db.collection("tasks").doc(t2.id).update({order:t2.order});
}

function render(){
  const list=document.getElementById('list');
  list.innerHTML='';

  tasks
  .filter(t=>!ownerFilter||t.owner===ownerFilter)
  .filter(t=>!categoryFilter||t.category===categoryFilter)
  .filter(t=>{
    if(!timeFilter||!t.deadline) return true;
    const d=new Date(t.deadline);
    const now=new Date();
    if(timeFilter==='week') return (d-now)/(1000*60*60*24)<=7;
    if(timeFilter==='month') return (d-now)/(1000*60*60*24)<=30;
  })
  .sort((a,b)=>a.order-b.order)
  .forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='task'+(t.done?' done':'');

    div.innerHTML=`
    <div class='header'>
      <div><span class='priority'>#${i+1}</span> ${t.name}</div>
      <button onclick="toggleDone('${t.id}',${t.done})">${t.done?'🔁':'✅'}</button>
    </div>
    <div>${t.owner} | ${t.category||'-'}</div>
    <div>
      <button onclick="reorder(${i},-1)">⬆️</button>
      <button onclick="reorder(${i},1)">⬇️</button>
    </div>
    `;

    list.appendChild(div);
  });
}

// realtime
 db.collection("tasks").orderBy("order")
 .onSnapshot(snap=>{
  tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});
</script>

</body>
</html>
