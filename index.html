<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#00e676"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='36' fill='%23060e1b'/><text x='24' y='148' font-size='130' font-family='monospace' font-weight='bold' fill='%2300e676'>N</text></svg>"/>
<title>N7 Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ===== DARK ===== */
:root{
  --bg:#060e1b; --s1:#0c1a2e; --s2:#112238; --s3:#172d48;
  --border:#1f3550; --border2:#2a4666;
  --text:#edf2fb; --sub:#8fafc8; --dim:#3d6080;
  --green:#00e676; --green-bg:rgba(0,230,118,.1);
  --amber:#ffb300; --red:#ff5252; --blue:#448aff;
  --shadow:rgba(0,0,0,.5); --shine:rgba(255,255,255,.018);
  --sheet:#0c1a2e; --radius:12px; --rsm:8px;
}
/* ===== LIGHT ===== */
body.light{
  --bg:#f0f4f8; --s1:#fff; --s2:#e8eef5; --s3:#dce4ef;
  --border:#c4d0df; --border2:#93acc3;
  --text:#0d1f2d; --sub:#3d5a73; --dim:#8aa0b5;
  --green:#00995a; --green-bg:rgba(0,153,90,.09);
  --amber:#b76e00; --red:#c62828; --blue:#1557b0;
  --shadow:rgba(0,0,0,.13); --shine:rgba(0,0,0,0);
  --sheet:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Outfit',sans-serif; font-size:15px;
  min-height:100dvh; overflow-x:hidden;
  transition:background .25s,color .25s;
  text-transform:uppercase;
}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky; top:0; z-index:200;
  background:rgba(6,14,27,.97);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:10px 14px 9px;
  transition:background .25s,border-color .25s;
}
body.light .topbar{background:rgba(240,244,248,.97);}

.topbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.topbar-left{display:flex;align-items:center;gap:8px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2.5s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.stats-pill{font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace;background:var(--s2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;transition:background .25s,border-color .25s;}
.topbar-right{display:flex;align-items:center;gap:7px;}
.icon-btn{width:32px;height:32px;border-radius:var(--rsm);background:var(--s2);border:1px solid var(--border);color:var(--sub);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:hover{border-color:var(--border2);color:var(--text);}

/* filter rows */
.filter-group{margin-bottom:7px;}
.filter-group:last-child{margin-bottom:0;}
.filter-label{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:2px;font-family:'JetBrains Mono',monospace;margin-bottom:5px;}
.chips-row{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--s1);color:var(--sub);transition:all .12s;user-select:none;white-space:nowrap;}
.chip:hover{border-color:var(--border2);color:var(--text);}
.chip.ao{background:rgba(68,138,255,.13);border-color:rgba(68,138,255,.4);color:var(--blue);}
.chip.ad{background:rgba(255,179,0,.13);border-color:rgba(255,179,0,.4);color:var(--amber);}
.chip.ac{background:var(--green-bg);border-color:rgba(0,230,118,.35);color:var(--green);}
body.light .chip.ac{border-color:rgba(0,153,90,.4);}
.chip.blank-chip{border-style:dashed;}

/* ===== CONTAINER ===== */
.container{max-width:720px;margin:0 auto;padding:10px 12px 110px;}

/* ===== TASK CARD ===== */
.task-card{
  background:var(--s1);border:1px solid var(--border);border-left:4px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;cursor:grab;position:relative;
  transition:box-shadow .18s,border-color .18s,opacity .18s;
  user-select:none;
}
.task-card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(135deg,var(--shine) 0%,transparent 55%);
}
.task-card:hover{border-color:var(--border2);box-shadow:0 4px 18px var(--shadow);}
.task-card.done{opacity:.3;}
.task-card.drag-lifted{
  opacity:.08;
  cursor:grabbing;
}

/* drag spacer */
.drag-spacer{
  border:2px dashed var(--green);
  border-radius:var(--radius);
  background:var(--green-bg);
  margin-bottom:6px;
  position:relative;
  transition:height .15s ease;
}
.drag-spacer::before{
  content:'DROP HERE';position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--green);
  letter-spacing:2px;font-family:'JetBrains Mono',monospace;
  opacity:.6;
}

/* drag ghost */
.drag-ghost{
  position:fixed;z-index:9999;pointer-events:none;
  border:2px solid var(--green) !important;
  border-radius:var(--radius);
  box-shadow:0 16px 48px rgba(0,230,118,.28),0 4px 12px var(--shadow);
  transform:rotate(.6deg) scale(1.025);
  opacity:.92;
  cursor:grabbing;
}

/* card grid */
.card-grid{display:grid;grid-template-columns:26px 30px 1fr auto;gap:0 8px;padding:11px 12px 11px 8px;align-items:start;}
.rank-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--dim);padding-top:4px;text-align:right;user-select:none;}
.left-col{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:2px;}

.radio-btn{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);background:none;flex-shrink:0;}
.radio-btn:hover{border-color:var(--green);background:var(--green-bg);transform:scale(1.1);}
.radio-btn:active{transform:scale(.88);}
.radio-btn.done-r{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(0,230,118,.4);}
.radio-btn.done-r::after{content:'';width:8px;height:5px;border-left:2.5px solid var(--bg);border-bottom:2.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px);display:block;}

.btn-log{width:24px;height:24px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;position:relative;padding:0;}
.btn-log:hover{color:var(--blue);background:rgba(68,138,255,.12);transform:scale(1.1);}
.log-badge{position:absolute;top:-5px;right:-5px;min-width:14px;height:14px;padding:0 2px;background:var(--blue);border-radius:7px;font-size:8px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}

.task-body{min-width:0;}
.task-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.35;word-break:break-word;margin-bottom:2px;}
.task-card.done .task-name{text-decoration:line-through;color:var(--sub);}
.task-desc{font-size:12px;color:var(--sub);line-height:1.4;}
.task-desc:empty{display:none;}
.task-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;letter-spacing:.4px;font-family:'JetBrains Mono',monospace;}
.dbl-hint{font-size:9px;color:var(--dim);margin-top:4px;opacity:0;transition:opacity .2s;letter-spacing:1px;}
.task-card:hover .dbl-hint{opacity:1;}

.task-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-top:2px;min-width:66px;}
.owner-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;}
.due-badge{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.due-badge.overdue{color:var(--red);}
.due-badge.soon{color:var(--amber);}
.due-badge.ok{color:var(--dim);}

/* done separator */
.done-sep{display:flex;align-items:center;gap:10px;margin:22px 0 9px;cursor:pointer;user-select:none;}
.done-sep-line{flex:1;height:1px;background:var(--border);}
.done-sep-label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:2px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.done-sep-caret{font-size:10px;color:var(--dim);}

/* ===== FAB ===== */
.fab{position:fixed;bottom:24px;right:18px;width:56px;height:56px;background:var(--green);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;cursor:pointer;color:var(--bg);user-select:none;box-shadow:0 8px 28px rgba(0,230,118,.38);transition:transform .15s,box-shadow .15s;z-index:300;}
.fab:hover{transform:scale(1.06);box-shadow:0 12px 36px rgba(0,230,118,.5);}
.fab:active{transform:scale(.91);}
body.light .fab{box-shadow:0 8px 28px rgba(0,153,90,.3);}

/* ===== INSTALL BANNER ===== */
.install-banner{
  position:fixed;bottom:92px;left:12px;right:12px;
  background:var(--s1);border:1.5px solid var(--green);
  border-radius:14px;padding:12px 14px;z-index:400;
  display:none;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,230,118,.2);
  animation:sUp .3s ease;
}
.install-banner.show{display:flex;}
.install-icon{font-size:22px;flex-shrink:0;line-height:1;}
.install-txt{flex:1;min-width:0;}
.install-title{font-size:12px;font-weight:700;color:var(--text);}
.install-sub{font-size:10px;color:var(--sub);margin-top:2px;letter-spacing:.5px;}
.install-action{padding:7px 13px;background:var(--green);border:none;border-radius:7px;color:var(--bg);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;}
.install-dismiss{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ===== MODALS ===== */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:500;display:none;align-items:flex-end;transition:background .2s;}
.modal-ov.open{display:flex;background:rgba(0,0,0,.68);}
.sheet{width:100%;background:var(--sheet);border:1px solid var(--border2);border-bottom:none;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);animation:sUp .24s cubic-bezier(.4,0,.2,1);max-height:92dvh;overflow-y:auto;transition:background .25s,border-color .25s;}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

@media(min-width:640px){
  .modal-ov{align-items:center;justify-content:center;padding:24px;}
  .sheet{border-radius:18px;border-bottom:1px solid var(--border2);animation:fadeUp .2s ease;max-height:88vh;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .sheet-handle{display:none!important;}
  #editModal .sheet{max-width:640px;}
  #addModal .sheet,#logModal .sheet,#settingsModal .sheet{max-width:520px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  .form-full{grid-column:1/-1;}
}
@media(max-width:639px){.form-row{display:contents;}}

.sheet-handle{width:38px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;}
.sheet-inner{padding:18px 20px 24px;}
.sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.sheet-ttl{font-size:18px;font-weight:800;color:var(--text);letter-spacing:.5px;}
.sheet-sub{font-size:11px;color:var(--sub);margin-top:3px;letter-spacing:.5px;}
.btn-del{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);color:var(--red);padding:7px 13px;border-radius:7px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.btn-del:hover{background:rgba(255,82,82,.2);border-color:var(--red);}

.field{margin-bottom:13px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1.5px;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.field input,.field select,.field textarea{width:100%;background:var(--s3);border:1.5px solid var(--border);color:var(--text);padding:11px 14px;border-radius:var(--rsm);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;appearance:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.field .inp-xl{font-size:16px;font-weight:700;padding:12px 14px;}
.field textarea{resize:none;min-height:70px;line-height:1.5;}
.field select option{background:var(--s2);}
.field input[type="date"]{color-scheme:dark;}
body.light .field input[type="date"]{color-scheme:light;}

.cat-grid{display:flex;flex-wrap:wrap;gap:7px;}
.cat-opt{padding:7px 13px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;color:var(--sub);transition:all .12s;user-select:none;font-family:'JetBrains Mono',monospace;}
.cat-opt:hover{color:var(--text);border-color:var(--border2);}
.cat-opt.csel{font-weight:800;}

.sheet-btns{display:flex;gap:9px;margin-top:18px;}
.btn-p{flex:1;padding:13px;background:var(--green);border:none;border-radius:var(--rsm);color:var(--bg);font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.btn-p:hover{filter:brightness(1.07);box-shadow:0 4px 16px rgba(0,230,118,.28);}
.btn-p:active{transform:scale(.97);}
.btn-s{padding:13px 18px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--sub);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-s:hover{border-color:var(--border2);color:var(--text);}
.kbd-hint{font-size:9px;color:var(--dim);text-align:right;margin-top:10px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}

.log-entry{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--s2);}
.log-entry:last-child{border:none;}
.log-ts{color:var(--dim);flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;padding-top:2px;}
.log-txt{color:var(--text);font-size:13px;line-height:1.4;}
.log-empty{font-size:12px;color:var(--sub);padding:10px 0;}

.set-section{margin-bottom:22px;}
.set-title{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;}
.item-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;min-height:28px;}
.item-pill{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:var(--text);background:var(--s2);}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0;display:flex;align-items:center;width:18px;height:18px;justify-content:center;border-radius:50%;transition:all .1s;}
.del-btn:hover{color:var(--red);background:rgba(255,82,82,.12);}
.add-row{display:flex;gap:8px;}
.add-row input{flex:1;background:var(--s3);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
.add-row input:focus{border-color:var(--green);}
.add-row button{padding:9px 15px;background:var(--s3);border:1.5px solid var(--border);color:var(--sub);border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;font-family:'Outfit',sans-serif;white-space:nowrap;}
.add-row button:hover{border-color:var(--green);color:var(--green);}

.empty{text-align:center;padding:70px 20px;color:var(--dim);font-size:13px;letter-spacing:1px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-head">
    <div class="topbar-left">
      <div class="status-dot"></div>
      <div class="stats-pill" id="stats">-- tasks</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">&#9788;</button>
      <button class="icon-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
  </div>
  <div id="filtersWrap"></div>
</div>

<div class="container" id="list"></div>
<div class="fab" onclick="openAdd()" title="New task (N)">+</div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="install-icon">&#128187;</div>
  <div class="install-txt">
    <div class="install-title">Add to home screen</div>
    <div class="install-sub" id="installSub">Install as app for quick access</div>
  </div>
  <button class="install-action" onclick="handleInstall()">Install</button>
  <button class="install-dismiss" onclick="dismissInstall()">&#215;</button>
</div>

<!-- ADD SHEET -->
<div class="modal-ov" id="addModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-hd"><div><div class="sheet-ttl">New Task</div><div class="sheet-sub">Enter to save quickly</div></div></div>
      <div class="field form-full">
        <label>Task Name</label>
        <input class="inp-xl" id="inp-name" placeholder="What needs to be done?" autocomplete="off"/>
      </div>
      <div class="field form-full">
        <label>Description</label>
        <textarea id="inp-desc" placeholder="Optional details..." rows="2"></textarea>
      </div>
      <div class="form-row">
        <div class="field"><label>Owner</label><select id="inp-owner"></select></div>
        <div class="field"><label>Due Date</label><input id="inp-due" type="date"/></div>
      </div>
      <div class="field form-full" id="addCatWrap" style="display:none">
        <label>Category</label>
        <div class="cat-grid" id="addCatGrid"></div>
      </div>
      <div class="sheet-btns form-full">
        <button class="btn-s" onclick="closeAdd()">Cancel</button>
        <button class="btn-p" onclick="addTask()">Add Task</button>
      </div>
      <div class="kbd-hint">N to open &nbsp;|&nbsp; Enter to save &nbsp;|&nbsp; Esc to close</div>
    </div>
  </div>
</div>

<!-- EDIT SHEET -->
<div class="modal-ov" id="editModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-hd">
        <div><div class="sheet-ttl">Edit Task</div><div class="sheet-sub" id="edit-sub">rank &amp; owner</div></div>
        <button class="btn-del" onclick="deleteTask()">Delete</button>
      </div>
      <div class="field form-full"><label>Task Name</label><input class="inp-xl" id="edit-name" placeholder="Task name..." autocomplete="off"/></div>
      <div class="field form-full"><label>Description</label><textarea id="edit-desc" placeholder="Add a description..." rows="3"></textarea></div>
      <div class="form-row">
        <div class="field"><label>Owner</label><select id="edit-owner"></select></div>
        <div class="field"><label>Due Date</label><input id="edit-due" type="date"/></div>
      </div>
      <div class="field form-full" id="editCatWrap" style="display:none">
        <label>Category</label>
        <div class="cat-grid" id="editCatGrid"></div>
      </div>
      <div class="sheet-btns form-full">
        <button class="btn-s" onclick="closeEdit()">Cancel</button>
        <button class="btn-p" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- LOG SHEET -->
<div class="modal-ov" id="logModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-hd"><div><div class="sheet-ttl" id="log-ttl">Updates</div><div class="sheet-sub" id="log-sub">0 updates</div></div></div>
      <div id="log-list" style="margin-bottom:14px;max-height:230px;overflow-y:auto;"></div>
      <div class="field"><label>New Update</label><input id="inp-log" placeholder="What happened?" autocomplete="off"/></div>
      <div class="sheet-btns">
        <button class="btn-s" onclick="closeLog()">Close</button>
        <button class="btn-p" onclick="submitLog()">Add Update</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="modal-ov" id="settingsModal">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>

const OPALS=[
  {bg:'rgba(68,138,255,.13)',c:'#82b1ff',cl:'#1557b0'},
  {bg:'rgba(255,82,130,.13)',c:'#ff80ab',cl:'#c2185b'},
  {bg:'rgba(255,179,0,.13)',c:'#ffe082',cl:'#b76e00'},
  {bg:'rgba(0,230,118,.13)',c:'#69f0ae',cl:'#00764a'},
  {bg:'rgba(213,0,249,.13)',c:'#ea80fc',cl:'#7b1fa2'},
  {bg:'rgba(255,109,0,.13)',c:'#ffab40',cl:'#e65100'},
];
const CC=['#00e676','#448aff','#d500f9','#ffb300','#ff5252','#ff6d00','#00b0ff','#69f0ae'];
function ownerStyle(n){
  if(!n) return OPALS[0];
  const i=[...n].reduce((s,c)=>s+c.charCodeAt(0),0)%OPALS.length;
  const p=OPALS[i];return{bg:p.bg,c:isDark?p.c:p.cl};
}
function catColor(n){
  if(!n) return '#69f0ae';
  const i=[...n].reduce((s,c)=>s+c.charCodeAt(0),0)%CC.length;
  const c=CC[i];
  if(!isDark){const d={'#00e676':'#007a3d','#448aff':'#1557b0','#d500f9':'#7b1fa2','#ffb300':'#b76e00','#ff5252':'#c62828','#ff6d00':'#e65100','#00b0ff':'#0277bd','#69f0ae':'#00764a'};return d[c]||c;}
  return c;
}

/* ===== DATE HELPERS ===== */
function getRange(k){
  const now=new Date();
  const sod=d=>{const x=new Date(d);x.setHours(0,0,0,0);return x;};
  const eod=d=>{const x=new Date(d);x.setHours(23,59,59,999);return x;};
  if(k==='week'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return[sod(s),eod(e)];}
  if(k==='nextweek'){const s=new Date(now);s.setDate(now.getDate()-now.getDay()+7);const e=new Date(s);e.setDate(s.getDate()+6);return[sod(s),eod(e)];}
  if(k==='month')return[sod(new Date(now.getFullYear(),now.getMonth(),1)),eod(new Date(now.getFullYear(),now.getMonth()+1,0))];
  return null;
}
function fmtDue(str){
  if(!str)return null;
  const d=new Date(str+'T00:00:00');
  const now=new Date();now.setHours(0,0,0,0);
  const diff=Math.ceil((d-now)/86400000);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label=diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':`${d.getDate()} ${M[d.getMonth()]}`;
  return{label,cls:diff<0?'overdue':diff<=3?'soon':'ok'};
}

/* ===== FILTER ===== */
function getFiltered(){
  let r=tasks.slice();
  if(ownerF) r=r.filter(t=>t.owner===ownerF);
  if(dateF==='blank') r=r.filter(t=>!t.dueDate);
  else if(dateF){const rng=getRange(dateF);if(rng)r=r.filter(t=>{if(!t.dueDate)return false;const d=new Date(t.dueDate+'T00:00:00');return d>=rng[0]&&d<=rng[1];});}
  if(catF==='blank') r=r.filter(t=>!t.category);
  else if(catF) r=r.filter(t=>t.category===catF);
  return r.sort((a,b)=>(a.order||0)-(b.order||0));
}

/* ======================================================
   DRAG — LIFT AND SHIFT with FLIP animation
====================================================== */
let dragState=null;

function flipAnimate(cards,beforeTops){
  const afterTops=cards.map(c=>c.getBoundingClientRect().top);
  cards.forEach((c,i)=>{
    const dy=beforeTops[i]-afterTops[i];
    if(Math.abs(dy)<1) return;
    c.style.transition='none';
    c.style.transform=`translateY(${dy}px)`;
    // Force repaint then animate
    c.getBoundingClientRect();
    c.style.transition='transform .2s cubic-bezier(.4,0,.2,1)';
    c.style.transform='';
  });
}

function cleanupTransforms(){
  document.querySelectorAll('.task-card').forEach(c=>{c.style.transform='';c.style.transition='';});
}

function initDrag(card,t,clientX,clientY){
  const rect=card.getBoundingClientRect();
  const list=document.getElementById('list');

  // Ghost - floats under finger/cursor
  const ghost=card.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.cssText+=`;position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;margin:0;transition:none;z-index:9999;`;
  document.body.appendChild(ghost);

  // Spacer - green dashed placeholder
  const spacer=document.createElement('div');
  spacer.className='drag-spacer';
  spacer.style.height=rect.height+'px';

  // Hide original, insert spacer in its place
  card.classList.add('drag-lifted');
  list.insertBefore(spacer,card);
  // Move card to end of body temporarily (out of flow)
  card.style.display='none';

  dragState={srcId:t.id,srcCard:card,ghost,spacer,offsetX:clientX-rect.left,offsetY:clientY-rect.top,active:true,lastKey:null};
  if(navigator.vibrate) navigator.vibrate(40);
}

function moveDrag(clientX,clientY){
  if(!dragState||!dragState.active) return;
  const{ghost,spacer,offsetX,offsetY,srcCard}=dragState;

  // Move ghost
  ghost.style.left=(clientX-offsetX)+'px';
  ghost.style.top=(clientY-offsetY)+'px';

  // Hide ghost+spacer to detect card under cursor
  ghost.style.visibility='hidden';
  spacer.style.visibility='hidden';
  const el=document.elementFromPoint(clientX,clientY);
  ghost.style.visibility='';
  spacer.style.visibility='';

  const targetCard=el&&el.closest('.task-card');
  if(!targetCard||targetCard===srcCard) return;

  const rect=targetCard.getBoundingClientRect();
  const above=clientY<rect.top+rect.height/2;
  const key=targetCard.dataset.id+(above?'A':'B');
  if(dragState.lastKey===key) return;
  dragState.lastKey=key;

  // FLIP: snapshot before
  const movingCards=Array.from(document.querySelectorAll('.task-card')).filter(c=>c!==srcCard);
  const before=movingCards.map(c=>c.getBoundingClientRect().top);

  // Move spacer
  const list=document.getElementById('list');
  if(above) list.insertBefore(spacer,targetCard);
  else list.insertBefore(spacer,targetCard.nextSibling);

  // FLIP: animate shift
  flipAnimate(movingCards,before);
}

async function endDrag(){
  if(!dragState||!dragState.active) return;
  const{srcId,srcCard,ghost,spacer}=dragState;
  dragState.active=false;

  // Snap ghost into spacer position smoothly
  const sr=spacer.getBoundingClientRect();
  ghost.style.transition='all .22s cubic-bezier(.4,0,.2,1)';
  ghost.style.left=sr.left+'px';
  ghost.style.top=sr.top+'px';
  ghost.style.transform='rotate(0deg) scale(1)';
  ghost.style.opacity='0';

  // Read new order from DOM (spacer = src position)
  const allChildren=Array.from(document.getElementById('list').children);
  const newOrder=[];
  allChildren.forEach(el=>{
    if(el.classList.contains('drag-spacer')) newOrder.push(srcId);
    else if(el.classList.contains('task-card')&&el.dataset.id!==srcId) newOrder.push(el.dataset.id);
  });

  await new Promise(r=>setTimeout(r,220));
  ghost.remove();
  spacer.remove();
  srcCard.style.display='';
  srcCard.classList.remove('drag-lifted');
  cleanupTransforms();
  dragState=null;

  if(newOrder.length){
    const batch=db.batch();
    newOrder.forEach((id,i)=>batch.update(db.collection('tasks').doc(id),{order:i*1000}));
    await batch.commit();
  }
}

/* ===== CREATE CARD ===== */
function createCard(t,rank){
  const card=document.createElement('div');
  card.className='task-card'+(t.done?' done':'');
  card.dataset.id=t.id;

  const due=fmtDue(t.dueDate);
  const os=ownerStyle(t.owner||'');
  const cc=t.category?catColor(t.category):null;
  const lc=(t.logs||[]).length;

  card.innerHTML=`
    <div class="card-grid">
      <div class="rank-num">#${rank}</div>
      <div class="left-col">
        <div class="radio-btn${t.done?' done-r':''}"></div>
        <button class="btn-log">&#9776;${lc?`<span class="log-badge">${lc>9?'9+':lc}</span>`:''}</button>
      </div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        ${t.desc?`<div class="task-desc">${t.desc}</div>`:''}
        ${cc?`<div class="task-tags"><span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}28">${t.category}</span></div>`:''}
        <div class="dbl-hint">double-click to edit</div>
      </div>
      <div class="task-meta">
        <span class="owner-tag" style="background:${os.bg};color:${os.c}">${t.owner}</span>
        ${due?`<span class="due-badge ${due.cls}">${due.label}</span>`:''}
      </div>
    </div>`;

  /* radio */
  card.querySelector('.radio-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const r=card.querySelector('.radio-btn');
    r.style.transform='scale(.78)';
    setTimeout(()=>r.style.transform='',200);
    toggleDone(t.id,t.done);
  });
  /* log */
  card.querySelector('.btn-log').addEventListener('click',e=>{e.stopPropagation();openLog(t.id);});

  /* double-click to open edit (desktop) */
  card.addEventListener('dblclick',e=>{if(!e.target.closest('.radio-btn,.btn-log'))openEdit(t.id);});

  /* -------- MOUSE DRAG (desktop) -------- */
  card.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.closest('.radio-btn,.btn-log')) return;
    const sx=e.clientX,sy=e.clientY;let moved=false;

    const onMove=ev=>{
      if(!moved&&(Math.abs(ev.clientX-sx)>5||Math.abs(ev.clientY-sy)>5)){
        moved=true;
        if(!dragState) initDrag(card,t,sx,sy);
      }
      if(moved&&dragState) moveDrag(ev.clientX,ev.clientY);
    };
    const onUp=()=>{
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      if(moved&&dragState) endDrag();
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });

  /* -------- TOUCH DRAG (mobile, long press) -------- */
  let lpTimer=null,touchSX=0,touchSY=0,touchMoved=false,touchDragging=false,lastTap=0;
  card.addEventListener('touchstart',e=>{
    if(e.target.closest('.radio-btn,.btn-log')) return;
    touchSX=e.touches[0].clientX;touchSY=e.touches[0].clientY;
    touchMoved=false;touchDragging=false;
    lpTimer=setTimeout(()=>{
      if(!touchMoved){touchDragging=true;initDrag(card,t,touchSX,touchSY);}
    },420);
  },{passive:true});

  card.addEventListener('touchmove',e=>{
    const dx=Math.abs(e.touches[0].clientX-touchSX),dy=Math.abs(e.touches[0].clientY-touchSY);
    if(dx>7||dy>7){touchMoved=true;if(!touchDragging){clearTimeout(lpTimer);return;}}
    if(!touchDragging) return;
    e.preventDefault();
    moveDrag(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});

  const onTouchEnd=e=>{
    clearTimeout(lpTimer);
    if(touchDragging){touchDragging=false;endDrag();return;}
    // double-tap to edit
    if(!e.target.closest('.radio-btn,.btn-log')){
      const now=Date.now();
      if(now-lastTap<340){e.preventDefault();openEdit(t.id);}
      lastTap=now;
    }
  };
  card.addEventListener('touchend',onTouchEnd);
  card.addEventListener('touchcancel',()=>{clearTimeout(lpTimer);if(touchDragging){touchDragging=false;endDrag();}});
  return card;
}

/* ===== RENDER ===== */
function render(){
  renderFilters();
  const f=getFiltered();
  const active=f.filter(t=>!t.done);
  const done=f.filter(t=>t.done);
  const list=document.getElementById('list');
  list.innerHTML='';
  document.getElementById('stats').textContent=active.length+' active'+(done.length?' / '+done.length+' done':'');
  if(!f.length){list.innerHTML='<div class="empty">No tasks. Press N or + to add one.</div>';return;}
  active.forEach((t,i)=>list.appendChild(createCard(t,i+1)));
  if(done.length){
    const sep=document.createElement('div');sep.className='done-sep';
    sep.onclick=()=>{doneColl=!doneColl;render();};
    sep.innerHTML=`<div class="done-sep-line"></div><div class="done-sep-label">Done ${done.length}</div><div class="done-sep-caret">${doneColl?'▶':'▼'}</div><div class="done-sep-line"></div>`;
    list.appendChild(sep);
    if(!doneColl) done.forEach((t,i)=>list.appendChild(createCard(t,active.length+i+1)));
  }
}

/* ===== REALTIME ===== */
db.collection('tasks').orderBy('order').onSnapshot(snap=>{tasks=snap.docs.map(d=>({id:d.id,...d.data()}));render();});

/* ===== INIT ===== */
initConfig();

/* ===== KEYBOARD ===== */
document.addEventListener('keydown',e=>{
  const a=document.activeElement,typing=a.isContentEditable||['INPUT','SELECT','TEXTAREA'].includes(a.tagName);
  if(e.key==='Escape'){['addModal','editModal','logModal','settingsModal'].forEach(id=>document.getElementById(id).classList.remove('open'));}
  if(e.key==='n'&&!typing){e.preventDefault();openAdd();}
});
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addTask();}});
['addModal','editModal','logModal','settingsModal'].forEach(id=>document.getElementById(id).addEventListener('click',()=>document.getElementById(id).classList.remove('open')));

/* ===== INSTALL BANNER ===== */
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;});
function showInstallBanner(){
  if(localStorage.getItem('n7-install-ok')) return;
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  const sub=document.getElementById('installSub');
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS) sub.textContent='Tap share icon → Add to home screen';
  else if(deferredInstall) sub.textContent='Tap Install to add to your home screen';
  else sub.textContent='Browser menu → Install app or add to home screen';
  document.getElementById('installBanner').classList.add('show');
}
function handleInstall(){
  if(deferredInstall){deferredInstall.prompt();deferredInstall.userChoice.then(r=>{if(r.outcome==='accepted')dismissInstall();deferredInstall=null;});}
}
function dismissInstall(){document.getElementById('installBanner').classList.remove('show');localStorage.setItem('n7-install-ok','1');}
setTimeout(showInstallBanner,3000);
</script>
</body>
